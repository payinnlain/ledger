        <input type="date" id="adj-credit-date" value="${todayStr()}"
          style="font-family:inherit;font-size:14px;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)">
      </div>
      <div id="adj-credit-preview" style="border-radius:var(--radius);padding:10px 12px;margin-bottom:16px;font-size:13px;text-align:center;background:var(--bg2);color:var(--text2)">輸入實際已用金額以預覽差額</div>
      <div style="text-align:right;display:flex;gap:8px;justify-content:flex-end">
        <button onclick="closeEdit()" style="padding:8px 18px;font-size:13px;border:0.5px solid var(--border2);background:transparent;border-radius:var(--radius);cursor:pointer;font-family:inherit;color:var(--text2)">取消</button>
        <button onclick="confirmCreditAdj(${id},${Math.abs(Math.min(0,currentBal))},'${a.currency}')" style="padding:8px 18px;font-size:13px;font-weight:500;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit">確認調整</button>
      </div>
    </div>`;
  modal.style.display='flex';
}
function previewCreditAdj(currentAmt, currency){
  const input=parseFloat(document.getElementById('adj-credit-bal')?.value)||0;
  const el=document.getElementById('adj-credit-preview');
  if(!el||isNaN(input)) return;
  const diff=input-currentAmt; // positive = we owe more, negative = over-recorded
  if(Math.abs(diff)<0.01){el.textContent='金額相同，無需調整';el.style.background='var(--bg2)';el.style.color='var(--text2)';return;}
  const isMore=diff>0;
  el.style.background=isMore?'var(--red-bg)':'var(--green-bg)';
  el.style.color=isMore?'var(--red)':'var(--green)';
  el.textContent=(isMore?'補記支出 +':'沖銷 -')+fmt(Math.abs(diff),currency)+(isMore?' （帳單比系統多）':' （系統比帳單多）');
}
function confirmCreditAdj(id, currentAmt, currency){
  const input=parseFloat(document.getElementById('adj-credit-bal')?.value);
  if(isNaN(input)||input<0){alert('請輸入有效金額');return;}
  const diff=input-currentAmt;
  if(Math.abs(diff)<0.01){closeEdit();return;}
  const date=document.getElementById('adj-credit-date')?.value||todayStr();
  const isMore=diff>0;
  txns.unshift({
    id:Date.now(), type:isMore?'out':'in',
    amount:Math.abs(diff), currency,
    cat:isMore?'其他支出':'退款',
    date, note:'信用卡對帳調整',
    acctId:id, toAcctId:null, project:null, tag:'對帳調整'
  });
  sv(); closeEdit(); renderAcctOverview(); renderDashboard();
}
function quickCreditPayment(id){
  const a=accounts.find(x=>x.id===id);
  if(!a) return;
  // Calculate this period bill
  let thisBillPay=0;
  if(a.billDay){
    const td2=new Date(); td2.setHours(0,0,0,0);
    const d2=td2.getDate();
    let currBill2;
    if(d2>=a.billDay){ currBill2=new Date(td2.getFullYear(),td2.getMonth(),a.billDay); }
    else { currBill2=new Date(td2.getFullYear(),td2.getMonth()-1,a.billDay); }
    const prevBill2=new Date(currBill2.getFullYear(),currBill2.getMonth()-1,a.billDay);
    const prevStr=prevBill2.getFullYear()+'-'+String(prevBill2.getMonth()+1).padStart(2,'0')+'-'+String(a.billDay).padStart(2,'0');
    const currStr=currBill2.getFullYear()+'-'+String(currBill2.getMonth()+1).padStart(2,'0')+'-'+String(a.billDay).padStart(2,'0');
    const billTxns=txns.filter(t=>t.acctId===a.id&&t.currency===a.currency&&t.date>=prevStr&&t.date<=currStr);
    thisBillPay=billTxns.reduce((s,t)=>s+(t.type==='out'?t.amount:-(t.amount)),0);
  }
  // Calculate due date
  let dueDateStr=todayStr();
  if(a.billDay){
    const td=new Date(); const d=td.getDate();
    let bm=td.getMonth(), by=td.getFullYear();
    if(d>=a.billDay){bm+=1; if(bm>11){bm=0;by+=1;}}
    const billDate=new Date(by,bm,a.billDay);
    if(a.dueDays){ billDate.setDate(billDate.getDate()+parseInt(a.dueDays)); }
    dueDateStr=billDate.toISOString().slice(0,10);
  }
  // Build bank account options
  const bankAccts=accounts.filter(x=>x.type==='bank');
  const bankOpts=bankAccts.map(x=>'<option value="'+x.id+'">'+x.name+' ('+x.currency+')</option>').join('');
  const modal=document.getElementById('edit-modal');
  modal.innerHTML=`
    <div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:400px;max-width:94vw">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <span style="font-size:15px;font-weight:500">💳 信用卡繳費</span>
        <button onclick="closeEdit()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2)">✕</button>
      </div>
      <div style="background:var(--red-bg);border-radius:var(--radius);padding:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--red)">${a.name} 本期帳單</span>
        <span style="font-size:18px;font-weight:700;color:var(--red)">${fmt(thisBillPay,a.currency)}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px">
        <label style="font-size:12px;color:var(--text2)">繳費金額</label>
        <input type="text" id="cc-pay-amt" value="${thisBillPay}" inputmode="decimal"
          style="font-family:inherit;font-size:18px;font-weight:600;padding:10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px">
        <label style="font-size:12px;color:var(--text2)">從哪個銀行帳戶繳款</label>
        <select id="cc-pay-acct" style="font-family:inherit;font-size:14px;padding:10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)">
          ${bankOpts}
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px">
        <label style="font-size:12px;color:var(--text2)">繳款日期</label>
        <input type="date" id="cc-pay-date" value="${dueDateStr}"
          style="font-family:inherit;font-size:14px;padding:10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)">
      </div>
      <div style="text-align:right;display:flex;gap:8px;justify-content:flex-end">
        <button onclick="closeEdit()" style="padding:10px 20px;font-size:13px;border:0.5px solid var(--border2);background:transparent;border-radius:var(--radius);cursor:pointer;font-family:inherit;color:var(--text2)">取消</button>
        <button onclick="confirmCreditPayment(${id},'${a.currency}')" style="padding:10px 20px;font-size:13px;font-weight:500;background:var(--red);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit">確認繳費</button>
      </div>
    </div>`;
  modal.style.display='flex';
}
function confirmCreditPayment(creditId, currency){
  const amt=parseFloat(document.getElementById('cc-pay-amt')?.value)||0;
  const bankId=parseInt(document.getElementById('cc-pay-acct')?.value)||null;
  const date=document.getElementById('cc-pay-date')?.value||todayStr();
  if(!amt||!bankId){ alert('請填入金額並選擇銀行帳戶'); return; }
  // Add payment as transfer: bank -> credit card (reduces credit card debt)
  txns.unshift({
    id:Date.now(), type:'xfer',
    amount:amt, currency,
    cat:'轉帳', date,
    note:'信用卡繳費',
    acctId:bankId, toAcctId:creditId,
    project:null, tag:null
  });
  sv(); closeEdit(); renderAcctOverview(); renderDashboard();
}
let _detailAcctId=null;
function openAcctDetail(acctId, event){
  if(event && event.target.tagName==='BUTTON') return;
  const a=accounts.find(x=>x.id===acctId); if(!a) return;
  _detailAcctId=acctId;
  // Populate month dropdown: all months that have txns for this account, plus current month
  const monthSet=new Set();
  txns.forEach(t=>{if((t.acctId===acctId||t.toAcctId===acctId)&&t.date) monthSet.add(t.date.slice(0,7));});
  const now=new Date();
  const cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  monthSet.add(cur);
  const months=[...monthSet].sort().reverse();
  const mSel=document.getElementById('acct-detail-month');
  mSel.innerHTML=`<option value="">全部時間</option>`+months.map(m=>`<option value="${m}">${m}</option>`).join('');
  mSel.value=cur;
  document.getElementById('acct-detail-type').value='';
  // Stats
  const bal=acctBalance(a);
  const allIn=txns.filter(t=>t.acctId===acctId&&t.type==='in').reduce((s,t)=>s+t.amount,0);
  const allOut=txns.filter(t=>t.acctId===acctId&&t.type==='out').reduce((s,t)=>s+t.amount,0);
  document.getElementById('acct-detail-title').textContent=a.name;
  document.getElementById('acct-detail-in').textContent='+'+fmt(allIn,a.currency);
  document.getElementById('acct-detail-out').textContent='-'+fmt(allOut,a.currency);
  const balEl=document.getElementById('acct-detail-bal');
  balEl.textContent=fmt(bal,a.currency);
  balEl.style.color=bal>=0?'var(--green)':'var(--red)';
  document.getElementById('acct-detail-panel').style.display='block';
  document.getElementById('acct-detail-panel').scrollIntoView({behavior:'smooth',block:'start'});
  renderAcctDetail();
}
function closeAcctDetail(){
  document.getElementById('acct-detail-panel').style.display='none';
  _detailAcctId=null;
}
function renderAcctDetail(){
  const acctId=_detailAcctId; if(!acctId) return;
  const a=accounts.find(x=>x.id===acctId); if(!a) return;
  const monthVal=document.getElementById('acct-detail-month').value;
  const typeVal=document.getElementById('acct-detail-type').value;
  let list=txns.filter(t=>t.acctId===acctId||t.toAcctId===acctId);
  if(monthVal) list=list.filter(t=>t.date&&t.date.startsWith(monthVal));
  if(typeVal) list=list.filter(t=>t.type===typeVal);
  list=list.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('acct-detail-list');
  if(!list.length){el.innerHTML='<div class="empty-state">此帳戶在這段期間沒有記錄</div>';return;}
  el.innerHTML=list.map(t=>{
    const isIncoming=t.type==='xfer'&&t.toAcctId===acctId;
    const bg=t.type==='in'||isIncoming?'var(--green-bg)':t.type==='out'?'var(--red-bg)':'var(--purple-bg)';
    const ic=t.type==='in'||isIncoming?'+':t.type==='out'?'-':'⇄';
    const c=t.type==='in'||isIncoming?'var(--green)':t.type==='out'?'var(--red)':'var(--purple)';
    const s=t.type==='in'||isIncoming?'+':t.type==='out'?'-':'';
    const badge=`<span class="badge badge-${t.type}">${t.type==='in'?'收入':t.type==='out'?'支出':'轉帳'}</span>`;
    const xferNote=t.type==='xfer'?(isIncoming?` ← ${acctName(t.acctId)}`:` → ${acctName(t.toAcctId)}`):'';
    return`<div class="txn-item">
      <div class="txn-icon" style="background:${bg}">${ic}</div>
      <div class="txn-meta">
        <div class="txn-desc">${t.cat}${t.note?' · '+t.note:''}</div>
        <div class="txn-sub">${t.date} ${badge}${xferNote}${t.tag?` <span style="background:var(--blue-bg);color:var(--blue);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:500">#${t.tag}</span>`:''}</div>
      </div>
      <div class="txn-amount" style="color:${c}">${s}${fmt(t.amount,t.currency)}</div>
      <button class="btn-sm" onclick="editTxn(${t.id})">編輯</button>
    </div>`;
  }).join('');
}
function drillDownAcct(acctId, event){
  if(event && event.target.tagName==='BUTTON') return;
  openAcctDetail(acctId, event);
}
function drillDownCat(cat){
  filterCat=cat;
  // Find the txn tab button and click it
  const tabEl=Array.from(document.querySelectorAll('.tab-btn')).find(b=>b.onclick&&b.onclick.toString().includes("'txn'"));
  if(tabEl){ switchTab('txn', tabEl); }
  else { switchTab('txn', document.querySelector('.tab-btn')); }
  setTimeout(()=>renderTxnList(), 150);
}

function saveManualFxRate(val){
  manualFxRate=parseFloat(val)||0;
  localStorage.setItem('manualFxRate', manualFxRate);
  renderDashboard();
}
function switchTab(t,el){
  if(t!=='txn') filterCat=null; // clear cat filter when leaving txn tab
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='dashboard') renderDashboard();
  if(t==='txn'){ refreshAcctSelects(); renderCalendar(); renderTxnList(); }
  if(t==='ar') renderAr();
  if(t==='budget') renderBudget();
  if(t==='tags') renderTags();
  if(t==='projects'){ renderProjects(); refreshProjectSelect(); }
  if(t==='accounts') renderAccounts();
}

// init
loadAll();
['txn-date','txn-inst-start'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=id==='txn-date'?todayStr():thisMonth();});
const fmEl=document.getElementById('filter-month'); if(fmEl) fmEl.value=thisMonth();
setTimeout(()=>renderCalendar(), 100);
populateCats();
refreshAcctSelects();
</script>
</body>
</html>
