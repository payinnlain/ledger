<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳本</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeece8;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --green: #1D9E75; --red: #D85A30; --amber: #BA7517; --blue: #185FA5; --purple: #534AB7;
    --green-bg: #E1F5EE; --red-bg: #FAECE7; --amber-bg: #FAEEDA; --blue-bg: #E6F1FB; --purple-bg: #EEEDFE;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f5f5f0; --text2: #a0a09a; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #0a3324; --red-bg: #3b1a10; --amber-bg: #3b2a08; --blue-bg: #0c2440; --purple-bg: #1e1a40;
    }
  }
  html, body { height: 100%; background: var(--bg3); font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: var(--text); }
  .app { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; }

  /* topbar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 16px; flex-wrap: wrap; gap: 10px; }
  .topbar h1 { font-size: 20px; font-weight: 600; }
  .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .nav-tabs { display: flex; gap: 3px; background: var(--bg2); border-radius: var(--radius); padding: 3px; }
  .tab-btn { padding: 6px 12px; font-size: 13px; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all .15s; white-space: nowrap; }
  .tab-btn.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border2); }

  /* data buttons */
  .btn-data { padding: 6px 12px; font-size: 12px; border: 0.5px solid var(--border2); background: var(--bg); border-radius: var(--radius); cursor: pointer; color: var(--text2); font-family: inherit; }
  .btn-data:hover { background: var(--bg2); }

  /* cards */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 14px; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  /* summary grid */
  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 600; }

  /* account cards */
  .acct-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 10px; margin-bottom: 14px; }
  .acct-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; position: relative; }
  .acct-card-icon { font-size: 22px; margin-bottom: 8px; }
  .acct-card-name { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .acct-card-bal { font-size: 18px; font-weight: 600; }
  .acct-card-cur { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .acct-del { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; opacity: 0; transition: opacity .15s; }
  .acct-card:hover .acct-del { opacity: 1; }

  /* forms */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.four  { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text2); }
  input[type=text], input[type=number], input[type=date], input[type=month], select, textarea {
    font-family: inherit; font-size: 14px; padding: 8px 10px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--text2); }

  /* type toggles */
  .type-toggle { display: flex; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border2); margin-bottom: 12px; }
  .type-btn { flex: 1; padding: 9px 8px; font-size: 13px; border: none; cursor: pointer; font-family: inherit; background: var(--bg); color: var(--text2); transition: all .15s; }
  .type-btn.active-in   { background: var(--green-bg); color: var(--green); font-weight: 500; }
  .type-btn.active-out  { background: var(--red-bg);   color: var(--red);   font-weight: 500; }
  .type-btn.active-xfer { background: var(--purple-bg);color: var(--purple);font-weight: 500; }
  .type-btn.active-ar   { background: var(--blue-bg);  color: var(--blue);  font-weight: 500; }
  .type-btn.active-ap   { background: var(--amber-bg); color: var(--amber); font-weight: 500; }

  .acct-type-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
  .acct-type-btn { padding: 9px 4px; font-size: 12px; border: 0.5px solid var(--border); background: var(--bg); border-radius: var(--radius); cursor: pointer; font-family: inherit; color: var(--text2); text-align: center; }
  .acct-type-btn.selected { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }

  /* buttons */
  .btn-primary { background: var(--text); color: var(--bg); border: none; padding: 9px 22px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border: 0.5px solid var(--border2); background: transparent; border-radius: 6px; cursor: pointer; color: var(--text2); font-family: inherit; white-space: nowrap; }
  .btn-sm:hover { background: var(--bg2); }
  .btn-sm.danger:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* list items */
  .txn-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--bg); }
  .txn-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .txn-meta { flex: 1; min-width: 0; }
  .txn-desc { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .txn-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }

  /* badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-in     { background: var(--green-bg);  color: var(--green); }
  .badge-out    { background: var(--red-bg);    color: var(--red); }
  .badge-xfer   { background: var(--purple-bg); color: var(--purple); }
  .badge-paid   { background: #EAF3DE; color: #3B6D11; }
  .badge-unpaid { background: var(--amber-bg);  color: var(--amber); }
  .badge-overdue{ background: #FCEBEB; color: #A32D2D; }

  /* ar items */
  .ar-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; }
  .ar-meta { flex: 1; min-width: 0; }

  /* budget bars */
  .budget-bar-wrap { margin-bottom: 12px; }
  .budget-bar-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .budget-bar-track { height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }

  /* charts */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chart-wrap { position: relative; width: 100%; height: 220px; margin-top: 8px; }

  /* panel */
  .panel { display: none; }
  .panel.active { display: block; }
  .empty-state { text-align: center; padding: 2.5rem; color: var(--text2); font-size: 14px; }

  /* filter row */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* footer note */
  .footer-note { text-align: center; font-size: 12px; color: var(--text3); padding: 20px 0 0; }

  @media (max-width: 640px) {
    /* 基本佈局 */
    .app { padding: 0 12px 80px; }
    .topbar { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 0 12px; }
    .topbar h1 { font-size: 17px; }
    .topbar-right { width: 100%; justify-content: space-between; }

    /* 底部導覽列 */
    .nav-tabs {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 0.5px solid var(--border);
      border-radius: 0; padding: 6px 4px;
      display: flex; justify-content: space-around;
      z-index: 1000; gap: 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    }
    .nav-tabs .tab-btn {
      flex: 1; padding: 6px 2px; font-size: 11px;
      border-radius: 6px; text-align: center;
    }
    .nav-tabs .tab-btn.active {
      background: var(--bg2); border: none;
    }

    /* 匯出匯入按鈕縮小 */
    .btn-data { padding: 5px 8px; font-size: 11px; }
    #sync-status { font-size: 11px; }

    /* 格線 */
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-grid, .form-grid.three, .form-grid.four { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .acct-type-grid { grid-template-columns: repeat(3,1fr); }
    .acct-grid { grid-template-columns: repeat(2,1fr); gap: 8px; }

    /* 卡片 */
    .card { padding: 14px 12px; }
    .metric { padding: 12px 12px; }
    .metric-value { font-size: 17px; }
    .metric-label { font-size: 11px; }

    /* 帳戶卡片 */
    .acct-card { padding: 12px; }
    .acct-card-bal { font-size: 16px; }

    /* 輸入框加大點選區域 */
    input[type=text], input[type=number], input[type=date], input[type=month], select, textarea {
      font-size: 16px !important; /* 防止 iOS 自動縮放 */
      padding: 10px 10px;
    }

    /* 按鈕 */
    .btn-primary { padding: 11px 20px; font-size: 14px; width: 100%; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .type-btn { padding: 10px 6px; font-size: 12px; }
    .acct-type-btn { padding: 10px 4px; font-size: 11px; }

    /* 交易列表 */
    .txn-item { padding: 10px 10px; gap: 8px; }
    .txn-desc { font-size: 13px; }
    .txn-sub { font-size: 11px; }
    .txn-amount { font-size: 14px; }
    .txn-icon { width: 28px; height: 28px; font-size: 12px; flex-shrink: 0; }

    /* AR items */
    .ar-item { padding: 10px 10px; gap: 8px; flex-wrap: wrap; }

    /* 區段標題 */
    .section-title { font-size: 13px; }
    .section-header { margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }

    /* 篩選列 */
    .filter-row { gap: 6px; }
    .filter-row select, .filter-row input[type=month] { font-size: 12px; padding: 6px 8px; max-width: 120px; }
    .asset-grid { grid-template-columns: 1fr !important; }
    .asset-grid > div { border-right: none !important; border-bottom: 0.5px solid var(--border); }
    .asset-grid > div:last-child { border-bottom: none; }
  }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f0efec;z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:40px 32px;width:300px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.12);">
    <div style="font-size:40px;margin-bottom:12px">🔒</div>
    <div style="font-size:17px;font-weight:600;color:#111;margin-bottom:20px">記帳本</div>
    <input id="pw" type="password" placeholder="輸入密碼"
      style="width:100%;padding:12px;font-size:16px;border:1.5px solid #ddd;border-radius:8px;text-align:center;font-family:inherit;background:#fafafa;color:#111;display:block;"
      onkeydown="if(event.key==='Enter')tryUnlock()">
    <div id="pw-err" style="color:#c0392b;font-size:12px;margin:8px 0;min-height:16px"></div>
    <button onclick="tryUnlock()"
      style="width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">進入</button>
  </div>
</div>

<script>
(function(){
  var PW = '5212';
  window.tryUnlock = function(){
    var val = document.getElementById('pw').value;
    if(val === PW){
      document.getElementById('lock-screen').style.display='none';
      sessionStorage.setItem('_unlocked','yes');
    } else {
      document.getElementById('pw-err').textContent='密碼錯誤';
      document.getElementById('pw').value='';
      document.getElementById('pw').focus();
    }
  };
  if(sessionStorage.getItem('_unlocked')==='yes'){
    document.addEventListener('DOMContentLoaded', function(){
      document.getElementById('lock-screen').style.display='none';
    });
  } else {
    document.addEventListener('DOMContentLoaded', function(){
      document.getElementById('pw').focus();
    });
  }
})();
</script>


<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;margin-bottom:4px">
    <span id="sync-status" style="font-size:12px;color:#BA7517">載入中...</span>
    <button onclick="reloadData()" class="btn-data" style="font-size:12px;padding:5px 12px">↻ 重整</button>
  </div>
  <div class="topbar">
    <h1>記帳本</h1>
    <div class="topbar-right">
      <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard',this)">總覽</button>
        <button class="tab-btn" onclick="switchTab('txn',this)">收支</button>
        <button class="tab-btn" onclick="switchTab('ar',this)">應收應付</button>
        <button class="tab-btn" onclick="switchTab('budget',this)">預算</button>
        <button class="tab-btn" onclick="switchTab('accounts',this)">帳戶</button>
      </div>
      <button class="btn-data" onclick="exportJSON()" title="備份資料">⬇ 匯出</button>
      <label class="btn-data" style="cursor:pointer" title="還原資料">⬆ 匯入<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
      <button class="btn-data" onclick="exportCSV()" title="匯出收支明細">📊 CSV</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="panel active">
    <div id="total-asset-bar" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 24px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px"></div>
    <div id="acct-overview" class="acct-grid"></div>
    <div class="summary-grid" id="summary-cards"></div>
    <div class="two-col">
      <div class="card">
        <div class="section-header"><span class="section-title">本月支出分類</span></div>
        <div class="chart-wrap"><canvas id="pieChart" role="img" aria-label="本月支出分類圓餅圖">支出分類統計</canvas></div>
      </div>
      <div class="card">
        <div class="section-header"><span class="section-title">近6個月收支</span></div>
        <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="近6個月收支長條圖">收支趨勢</canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="section-header"><span class="section-title">最近10筆記錄</span></div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- TXN -->
  <div id="tab-txn" class="panel">
    <div class="card">
      <div class="section-title">新增記錄</div>
      <div class="type-toggle" id="txn-type-toggle">
        <button class="type-btn active-in" onclick="setType('in',this)">收入</button>
        <button class="type-btn" onclick="setType('out',this)">支出</button>
        <button class="type-btn" onclick="setType('xfer',this)">轉帳</button>
      </div>
      <div class="form-grid four" style="margin-bottom:10px">
        <div class="form-group"><label>金額</label><input type="number" id="txn-amount" placeholder="0" min="0" step="0.01"></div>
        <div class="form-group"><label>幣別</label><select id="txn-currency"><option>TWD</option><option>USD</option><option>EUR</option><option>JPY</option><option>KRW</option><option>IDR</option><option>CNY</option><option>HKD</option><option>GBP</option><optgroup label="加密貨幣"><option>BTC</option><option>ETH</option><option>SOL</option><option>USDT</option><option>USDC</option><option>BNB</option><option>XRP</option></optgroup></select></div>
        <div class="form-group"><label>類別</label><select id="txn-cat"></select></div>
        <div class="form-group"><label>日期</label><input type="date" id="txn-date"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>帳戶類型</label><select id="txn-acct-type" onchange="filterAcctByType()">
          <option value="">全部</option>
          <option value="bank">🏦 銀行帳戶</option>
          <option value="cash">💵 現金</option>
          <option value="credit">💳 信用卡</option>
          <option value="invest">📈 投資帳戶</option>
          <option value="crypto">🪙 加密貨幣</option>
          <option value="loan">🏛 貸款</option>
          <option value="prepaid">🎴 預付/儲值卡</option>
        </select></div>
        <div class="form-group"><label id="txn-acct-label">帳戶</label><select id="txn-acct"></select></div>
        <div class="form-group" id="txn-to-wrap" style="display:none"><label>轉入帳戶</label><select id="txn-to-acct"></select></div>
        <div class="form-group"><label>備註</label><input type="text" id="txn-note" placeholder="選填"></div>
      </div>
      <div style="margin-top:14px;text-align:right"><button class="btn-primary" onclick="addTxn()">新增</button></div>
    </div>
    <div class="card">
      <div class="section-header">
        <span class="section-title">收支記錄</span>
        <div class="filter-row">
          <input type="month" id="filter-month" onchange="renderTxnList()">
          <select id="filter-acct" onchange="renderTxnList()"><option value="">全部帳戶</option></select>
          <select id="filter-type" onchange="renderTxnList()"><option value="">全部</option><option value="in">收入</option><option value="out">支出</option><option value="xfer">轉帳</option></select>
        </div>
      </div>
      <div id="txn-list"></div>
    </div>
  </div>

  <!-- AR/AP -->
  <div id="tab-ar" class="panel">
    <div class="card">
      <div class="section-title">新增應收 / 應付</div>
      <div class="type-toggle">
        <button class="type-btn active-ar" onclick="setArType('ar',this)">應收</button>
        <button class="type-btn" onclick="setArType('ap',this)">應付</button>
      </div>
      <div class="form-grid" style="margin-bottom:10px">
        <div class="form-group"><label>對象名稱</label><input type="text" id="ar-name" placeholder="公司或個人"></div>
        <div class="form-group"><label>金額</label><input type="number" id="ar-amount" placeholder="0" min="0"></div>
        <div class="form-group"><label>幣別</label><select id="ar-currency"><option>TWD</option><option>USD</option><option>EUR</option><option>JPY</option><option>KRW</option><option>IDR</option><option>CNY</option><option>HKD</option><option>GBP</option></select></div>
        <div class="form-group"><label>到期日</label><input type="date" id="ar-due"></div>
        <div class="form-group"><label>備註</label><input type="text" id="ar-note" placeholder="選填"></div>
      </div>
      <div style="text-align:right"><button class="btn-primary" onclick="addAr()">新增</button></div>
    </div>
    <div class="two-col">
      <div class="card"><div class="section-header"><span class="section-title" style="color:var(--blue)">應收帳款</span></div><div id="ar-list"></div></div>
      <div class="card"><div class="section-header"><span class="section-title" style="color:var(--amber)">應付帳款</span></div><div id="ap-list"></div></div>
    </div>
  </div>

  <!-- BUDGET -->
  <div id="tab-budget" class="panel">
    <div class="card">
      <div class="section-header">
        <span class="section-title">設定月度預算（TWD）</span>
        <button class="btn-sm" onclick="toggleCatEdit()">管理分類</button>
      </div>
      <div id="cat-edit-panel" style="display:none;margin-bottom:16px;padding:14px;background:var(--bg2);border-radius:var(--radius)">
        <div style="font-size:12px;color:var(--text2);margin-bottom:10px">新增或刪除預算分類（也會同步更新支出分類選單）</div>
        <div id="cat-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
        <div style="display:flex;gap:8px">

async function loadAll(){

async function saveToSupabase(data){
  try {
    // Upsert row with id=1
    const res = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer '+SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id: SB_ROW_ID, data })
    });
    if(res.ok || res.status===201){
      setSyncStatus('ok','已同步 ✓');
    } else {
      const err = await res.text();

    }
  } catch(e){
    setSyncStatus('err','同步失敗（已存本地）');
  }
}

function importJSON(e){
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(!confirm('確定要匯入？這會覆蓋目前所有資料。')) return;
      txns=d.txns||[]; arItems=d.arItems||[]; budgets=d.budgets||{}; accounts=d.accounts||[];
      sv(); refreshAcctSelects(); renderDashboard(); alert('匯入成功！');
    } catch { alert('檔案格式錯誤，請選擇正確的備份 JSON 檔。'); }
  };
  r.readAsText(file);
  e.target.value='';
}
function exportCSV(){

    rows.push([t.date,type,t.cat,t.amount,t.currency,aName,t.note||'']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');

  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));

function acctBalance(acct){
  let bal=acct.initBalance||0;
  txns.filter(t=>t.currency===acct.currency&&(t.acctId===acct.id||t.toAcctId===acct.id)).forEach(t=>{
    if(t.type==='in'  &&t.acctId===acct.id)   bal+=t.amount;
    if(t.type==='out' &&t.acctId===acct.id)   bal-=t.amount;
    if(t.type==='xfer'&&t.acctId===acct.id)   bal-=t.amount;
    if(t.type==='xfer'&&t.toAcctId===acct.id) bal+=t.amount;
  });
  return bal;
}

function loanProgress(a){
  if(!a.loanMonths) return '';
  let remaining;
  if(a.loanStartDate){
    const start = new Date(a.loanStartDate);
    const now = new Date();
    const elapsed = (now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth());
    remaining = Math.max(0, a.loanMonths - elapsed);
  } else if(a.loanEndDate){
    const end = new Date(a.loanEndDate);
    const now = new Date();
    remaining = Math.max(0, (end.getFullYear()-now.getFullYear())*12 + (end.getMonth()-now.getMonth()));
  } else {
    return ' · 共 '+a.loanMonths+' 期';
  }
  const pct = Math.round(((a.loanMonths-remaining)/a.loanMonths)*100);
  return ' · 剩餘 '+remaining+' 期（已還 '+pct+'%）';
}
function nextLoanPayment(a){
  if(!a.loanDay) return '';
  const today=new Date(), d=today.getDate();
  let m=today.getMonth(), y=today.getFullYear();
  if(d>=a.loanDay){ m+=1; if(m>11){m=0;y+=1;} }
  const next=new Date(y,m,a.loanDay);
  const days=Math.round((next-today)/(1000*60*60*24));
  return `還款日 ${next.getMonth()+1}/${next.getDate()}（${days}天後）${a.loanPayment?' · '+next.toLocaleString('zh-TW',{month:'numeric',day:'numeric'}):''}`;
}
function nextBillInfo(a){
  if(!a.billDay) return '';
  const today=new Date();
  const d=today.getDate();
  let billMonth=today.getMonth(), billYear=today.getFullYear();
  if(d >= a.billDay){ billMonth+=1; if(billMonth>11){billMonth=0;billYear+=1;} }
  const billDate=new Date(billYear,billMonth,a.billDay);
  const daysLeft=Math.round((billDate-today)/(1000*60*60*24));
  let dueStr='';
  if(a.dueDays){
    const dueDate=new Date(billDate); dueDate.setDate(dueDate.getDate()+a.dueDays);
    dueStr=' · 繳款 '+(dueDate.getMonth()+1)+'/'+(dueDate.getDate());
  }
  return `結帳 ${billDate.getMonth()+1}/${billDate.getDate()}（${daysLeft}天後）${dueStr}`;
}

    <input type="number" id="bgt-${c}" value="${budgets[c]||''}" placeholder="0" min="0" step="100"></div>`).join('')+'</div>';
  const m=thisMonth(), spent={};
  txns.filter(t=>t.type==='out'&&t.date.startsWith(m)&&t.currency==='TWD').forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount;});
  const prog=document.getElementById('budget-progress');
  const bCats=CATS_OUT.filter(c=>budgets[c]>0);
  if(!bCats.length){prog.innerHTML='<div class="empty-state">請先設定預算</div>';return;}
  // 加總
  const totalBudget = bCats.reduce((s,c)=>s+(budgets[c]||0),0);
  const totalSpent  = bCats.reduce((s,c)=>s+(spent[c]||0),0);
  const totalPct    = totalBudget>0?Math.min(100,(totalSpent/totalBudget)*100):0;
  const totalOver   = totalSpent>totalBudget;
  const totalCol    = totalPct<70?'var(--green)':totalPct<90?'var(--amber)':'var(--red)';

  const summary = `<div style="background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:14px;font-weight:500">本月預算總計</span>
      <span style="font-size:13px;color:${totalOver?'var(--red)':'var(--text2)'}">
        ${totalSpent.toLocaleString()} / ${totalBudget.toLocaleString()} TWD
        ${totalOver?' (超支)':''}
      </span>
    </div>
    <div class="budget-bar-track" style="height:10px;margin-bottom:8px">
      <div class="budget-bar-fill" style="width:${totalPct.toFixed(1)}%;background:${totalCol}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2)">
      <span>已使用 <strong style="color:${totalCol}">${totalPct.toFixed(1)}%</strong></span>
      <span>剩餘 <strong style="color:${totalOver?'var(--red)':'var(--green)'}">${(totalBudget-totalSpent).toLocaleString()} TWD</strong></span>
    </div>
  </div>`;

  prog.innerHTML = summary + bCats.map(c=>{
    const b=budgets[c]||0,s=spent[c]||0,pct=b>0?Math.min(100,(s/b)*100):0,over=s>b;
    const col=pct<70?'var(--green)':pct<90?'var(--amber)':'var(--red)';
    return `<div class="budget-bar-wrap">
      <div class="budget-bar-info">
        <span>${c}</span>
        <span style="color:${over?'var(--red)':'var(--text2)'}">
          ${s.toLocaleString()} / ${b.toLocaleString()} TWD
          <strong style="color:${col};margin-left:6px">${pct.toFixed(1)}%</strong>
          ${over?' (超支)':''}
        </span>
      </div>
      <div class="budget-bar-track"><div class="budget-bar-fill" style="width:${pct.toFixed(1)}%;background:${col}"></div></div>
    </div>`;
  }).join('');
}
function saveBudgets(){
  CATS_OUT.forEach(c=>{const v=parseFloat(document.getElementById('bgt-'+c)?.value);if(v>0)budgets[c]=v;else delete budgets[c];});
  sv(); renderBudget(); alert('預算已儲存');
}

/* ── total assets ── */
function renderTotalAssets(){
  const el=document.getElementById('total-asset-bar');
  if(!accounts.length){el.innerHTML='<span style="font-size:14px;color:var(--text2)">前往帳戶頁新增帳戶以計算總資產</span>';return;}

  const bankTotal  =accounts.filter(a=>a.type==='bank') .reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const cashTotal  =accounts.filter(a=>a.type==='cash'||a.type==='prepaid') .reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const investTotal=accounts.filter(a=>a.type==='invest').reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const cryptoTotal=accounts.filter(a=>a.type==='crypto').reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const totalAsset =bankTotal+cashTotal+investTotal+cryptoTotal;

  const creditDebt=accounts.filter(a=>a.type==='credit').reduce((s,a)=>{const b=acctBalance(a);return s+(b<0?Math.abs(twdEq(b,a.currency)):0);},0);
  const loanDebt  =accounts.filter(a=>a.type==='loan')  .reduce((s,a)=>{const b=acctBalance(a);return s+(b<0?Math.abs(twdEq(b,a.currency)):0);},0);
  const totalLiab =creditDebt+loanDebt;
  const net=totalAsset-totalLiab;
  const ratio=totalAsset>0?Math.min(100,(net/totalAsset)*100):0;

  function row(icon,label,val,color){
    if(Math.abs(val)<0.5) return '';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border)"><span style="font-size:13px;color:var(--text2)">'+icon+' '+label+'</span><span style="font-size:13px;font-weight:500;color:'+(color||'var(--text)')+'">'+Math.round(val).toLocaleString()+'</span></div>';
  }

  el.style.cssText='border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0;margin-bottom:14px;overflow:hidden;background:var(--bg);width:100%';
  el.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;width:100%" class="asset-grid">'+
    '<div style="padding:16px 18px;border-right:0.5px solid var(--border)">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">資產</div>'+
      row('🏦','銀行',bankTotal)+
      row('💵','現金 / 儲值',cashTotal)+
      row('📈','投資',investTotal)+
      row('🪙','加密貨幣',cryptoTotal)+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px">'+
        '<span style="font-size:12px;color:var(--text2)">小計</span>'+
        '<span style="font-size:17px;font-weight:700;color:var(--green)">'+Math.round(totalAsset).toLocaleString('zh-TW')+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="padding:16px 18px;border-right:0.5px solid var(--border)">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">負債</div>'+
      row('💳','信用卡',creditDebt,'var(--red)')+
      row('🏛','貸款',loanDebt,'var(--red)')+
      (totalLiab<0.5?'<div style="font-size:13px;color:var(--text3);padding:5px 0">無負債</div>':'')+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px">'+
        '<span style="font-size:12px;color:var(--text2)">小計</span>'+
        '<span style="font-size:17px;font-weight:700;color:'+(totalLiab>0?'var(--red)':'var(--text2)')+'">'+Math.round(totalLiab).toLocaleString()+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="padding:16px 18px;background:'+(net>=0?'var(--green-bg)':'var(--red-bg)')+'">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">淨資產</div>'+
      '<div style="font-size:28px;font-weight:700;color:'+(net>=0?'var(--green)':'var(--red)')+'">'+Math.round(net).toLocaleString()+'</div>'+
      '<div style="font-size:11px;color:var(--text2);margin-top:4px;margin-bottom:12px">≈ TWD</div>'+
      '<div style="height:5px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden">'+
        '<div style="height:100%;border-radius:3px;background:'+(net>=0?'var(--green)':'var(--red)')+'transition:width .4s;width:'+ratio.toFixed(1)+'%"></div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--text2);margin-top:5px">'+ratio.toFixed(1)+'% 資產負債比</div>'+
    '</div>'+
    '</div>';
}
/* ── dashboard ── */
function renderDashboard(){
  renderTotalAssets();
  renderAcctOverview();
  const m=thisMonth(), mT=txns.filter(t=>t.date.startsWith(m));
  const totalIn =mT.filter(t=>t.type==='in') .reduce((s,t)=>s+twdEq(t.amount,t.currency),0);
  const totalOut=mT.filter(t=>t.type==='out').reduce((s,t)=>s+twdEq(t.amount,t.currency),0);
  const arTotal =arItems.filter(a=>a.type==='ar'&&a.status!=='paid').reduce((s,a)=>s+twdEq(a.amount,a.currency),0);
  const apTotal =arItems.filter(a=>a.type==='ap'&&a.status!=='paid').reduce((s,a)=>s+twdEq(a.amount,a.currency),0);
  const net=totalIn-totalOut;
  document.getElementById('summary-cards').innerHTML=`
    <div class="metric"><div class="metric-label">本月收入 (約TWD)</div><div class="metric-value" style="color:var(--green)">+${Math.round(totalIn).toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">本月支出 (約TWD)</div><div class="metric-value" style="color:var(--red)">-${Math.round(totalOut).toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">本月結餘 (約TWD)</div><div class="metric-value" style="color:${net>=0?'var(--green)':'var(--red)'}">${Math.round(net).toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">應收 / 應付</div><div class="metric-value" style="color:var(--amber)">${Math.round(arTotal).toLocaleString()} / ${Math.round(apTotal).toLocaleString()}</div></div>`;

  const catSpend={};
  mT.filter(t=>t.type==='out').forEach(t=>{catSpend[t.cat]=(catSpend[t.cat]||0)+twdEq(t.amount,t.currency);});
  const cL=Object.keys(catSpend), cV=cL.map(c=>Math.round(catSpend[c]));
  if(pieInst) pieInst.destroy();
  if(cL.length){
    pieInst=new Chart(document.getElementById('pieChart'),{type:'doughnut',
      data:{labels:cL,datasets:[{data:cV,backgroundColor:CAT_COLORS.slice(0,cL.length),borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:12},boxWidth:12,padding:8}}}}});
  }
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const bIn =months.map(mo=>Math.round(txns.filter(t=>t.type==='in' &&t.date.startsWith(mo)).reduce((s,t)=>s+twdEq(t.amount,t.currency),0)));
  const bOut=months.map(mo=>Math.round(txns.filter(t=>t.type==='out'&&t.date.startsWith(mo)).reduce((s,t)=>s+twdEq(t.amount,t.currency),0)));
  if(barInst) barInst.destroy();
  barInst=new Chart(document.getElementById('barChart'),{type:'bar',
    data:{labels:months.map(m=>m.slice(5)+'月'),datasets:[
      {label:'收入',data:bIn,backgroundColor:'#5DCAA5',borderRadius:4},
      {label:'支出',data:bOut,backgroundColor:'#F0997B',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:12},boxWidth:12}}},
      scales:{x:{ticks:{font:{size:12}}},y:{ticks:{font:{size:12},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}}}});

  const recentEl=document.getElementById('recent-list');
  if(!txns.length){recentEl.innerHTML='<div class="empty-state">尚無記錄，前往收支頁新增</div>';return;}
  recentEl.innerHTML=txns.slice(0,10).map(t=>{
    const bg=t.type==='in'?'var(--green-bg)':t.type==='out'?'var(--red-bg)':'var(--purple-bg)';
    const c=t.type==='in'?'var(--green)':t.type==='out'?'var(--red)':'var(--purple)';
    const s=t.type==='in'?'+':t.type==='out'?'-':'';
    return `<div class="txn-item">
      <div class="txn-icon" style="background:${bg};font-size:12px">${t.type==='in'?'+':t.type==='out'?'-':'⇄'}</div>
      <div class="txn-meta"><div class="txn-desc">${t.cat}${t.note?' · '+t.note:''}</div><div class="txn-sub">${t.date}${t.acctId?' · '+acctName(t.acctId):''}</div></div>
      <div class="txn-amount" style="color:${c}">${s}${fmt(t.amount,t.currency)}</div>
    </div>`;
  }).join('');
}

function switchTab(t,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='dashboard') renderDashboard();
  if(t==='txn'){ refreshAcctSelects(); renderTxnList(); }
  if(t==='ar') renderAr();
  if(t==='budget') renderBudget();
  if(t==='accounts') renderAccounts();
}

// init
loadAll();
document.getElementById('txn-date').value=todayStr();
document.getElementById('filter-month').value=thisMonth();
populateCats();
refreshAcctSelects();
renderDashboard();
</script>
