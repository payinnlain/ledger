<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳本</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeece8;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --green: #1D9E75; --red: #D85A30; --amber: #BA7517; --blue: #185FA5; --purple: #534AB7;
    --green-bg: #E1F5EE; --red-bg: #FAECE7; --amber-bg: #FAEEDA; --blue-bg: #E6F1FB; --purple-bg: #EEEDFE;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f5f5f0; --text2: #a0a09a; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #0a3324; --red-bg: #3b1a10; --amber-bg: #3b2a08; --blue-bg: #0c2440; --purple-bg: #1e1a40;
    }
  }
  html, body { height: 100%; background: var(--bg3); font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: var(--text); }
  .app { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; }

  /* topbar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 16px; flex-wrap: wrap; gap: 10px; }
  .topbar h1 { font-size: 20px; font-weight: 600; }
  .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .nav-tabs { display: flex; gap: 3px; background: var(--bg2); border-radius: var(--radius); padding: 3px; }
  .tab-btn { padding: 6px 12px; font-size: 13px; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all .15s; white-space: nowrap; }
  .tab-btn.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border2); }

  /* data buttons */
  .btn-data { padding: 6px 12px; font-size: 12px; border: 0.5px solid var(--border2); background: var(--bg); border-radius: var(--radius); cursor: pointer; color: var(--text2); font-family: inherit; }
  .btn-data:hover { background: var(--bg2); }

  /* cards */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 14px; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  /* summary grid */
  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 600; }

  /* account cards */
  .acct-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 10px; margin-bottom: 14px; }
  .acct-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; position: relative; }
  .acct-card-icon { font-size: 22px; margin-bottom: 8px; }
  .acct-card-name { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .acct-card-bal { font-size: 18px; font-weight: 600; }
  .acct-card-cur { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .acct-del { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; opacity: 0; transition: opacity .15s; }
  .acct-card:hover .acct-del { opacity: 1; }

  /* forms */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.four  { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text2); }
  input[type=text], input[type=number], input[type=date], input[type=month], select, textarea {
    font-family: inherit; font-size: 14px; padding: 8px 10px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--text2); }

  /* type toggles */
  .type-toggle { display: flex; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border2); margin-bottom: 12px; }
  .type-btn { flex: 1; padding: 9px 8px; font-size: 13px; border: none; cursor: pointer; font-family: inherit; background: var(--bg); color: var(--text2); transition: all .15s; }
  .type-btn.active-in   { background: var(--green-bg); color: var(--green); font-weight: 500; }
  .type-btn.active-out  { background: var(--red-bg);   color: var(--red);   font-weight: 500; }
  .type-btn.active-xfer { background: var(--purple-bg);color: var(--purple);font-weight: 500; }
  .type-btn.active-ar   { background: var(--blue-bg);  color: var(--blue);  font-weight: 500; }
  .type-btn.active-ap   { background: var(--amber-bg); color: var(--amber); font-weight: 500; }

  .acct-type-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
  .acct-type-btn { padding: 9px 4px; font-size: 12px; border: 0.5px solid var(--border); background: var(--bg); border-radius: var(--radius); cursor: pointer; font-family: inherit; color: var(--text2); text-align: center; }
  .acct-type-btn.selected { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }

  /* buttons */
  .btn-primary { background: var(--text); color: var(--bg); border: none; padding: 9px 22px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border: 0.5px solid var(--border2); background: transparent; border-radius: 6px; cursor: pointer; color: var(--text2); font-family: inherit; white-space: nowrap; }
  .btn-sm:hover { background: var(--bg2); }
  .btn-sm.danger:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* list items */
  .txn-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--bg); }
  .txn-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .txn-meta { flex: 1; min-width: 0; }
  .txn-desc { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .txn-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }

  /* badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-in     { background: var(--green-bg);  color: var(--green); }
  .badge-out    { background: var(--red-bg);    color: var(--red); }
  .badge-xfer   { background: var(--purple-bg); color: var(--purple); }
  .badge-paid   { background: #EAF3DE; color: #3B6D11; }
  .badge-unpaid { background: var(--amber-bg);  color: var(--amber); }
  .badge-overdue{ background: #FCEBEB; color: #A32D2D; }

  /* ar items */
  .ar-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; }
  .ar-meta { flex: 1; min-width: 0; }

  /* budget bars */
  .budget-bar-wrap { margin-bottom: 12px; }
  .budget-bar-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .budget-bar-track { height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }

  /* charts */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chart-wrap { position: relative; width: 100%; height: 220px; margin-top: 8px; }

  /* panel */
  .panel { display: none; }
  .panel.active { display: block; }
  .empty-state { text-align: center; padding: 2.5rem; color: var(--text2); font-size: 14px; }

  /* filter row */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* footer note */
  .footer-note { text-align: center; font-size: 12px; color: var(--text3); padding: 20px 0 0; }

  .chip-btn {
    padding: 7px 14px; font-size: 13px; border: 1px solid var(--border2);
    background: var(--bg); color: var(--text2); border-radius: 20px;
    cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent; min-height: 36px;
  }
  .chip-btn:active { opacity: 0.7; }
  .chip-btn.chip-active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

  @media (max-width: 640px) {
  .acct-grid { grid-template-columns: repeat(2,1fr) !important; }
    /* 基本佈局 */
    .app { padding: 0 12px 80px; }
    .topbar { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 0 12px; }
    .topbar h1 { font-size: 17px; }
    .topbar-right { width: 100%; justify-content: space-between; }

    /* 底部導覽列 */
    .nav-tabs {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 0.5px solid var(--border);
      border-radius: 0; padding: 6px 4px;
      display: flex; justify-content: space-around;
      z-index: 1000; gap: 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    }
    .nav-tabs .tab-btn {
      flex: 1; padding: 6px 2px; font-size: 11px;
      border-radius: 6px; text-align: center;
    }
    .nav-tabs .tab-btn.active {
      background: var(--bg2); border: none;
    }

    /* 匯出匯入按鈕縮小 */
    .btn-data { padding: 5px 8px; font-size: 11px; }
    #sync-status { font-size: 11px; }

    /* 格線 */
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-grid, .form-grid.three, .form-grid.four { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .acct-type-grid { grid-template-columns: repeat(3,1fr); }
    .acct-grid { grid-template-columns: repeat(2,1fr); gap: 8px; }

    /* 卡片 */
    .card { padding: 14px 12px; }
    .metric { padding: 12px 12px; }
    .metric-value { font-size: 17px; }
    .metric-label { font-size: 11px; }

    /* 帳戶卡片 */
    .acct-card { padding: 12px; }
    .acct-card-bal { font-size: 16px; }

    /* 輸入框加大點選區域 */
    input[type=text], input[type=number], input[type=date], input[type=month], select, textarea {
      font-size: 16px !important; /* 防止 iOS 自動縮放 */
      padding: 10px 10px;
    }

    /* 按鈕 */
    .btn-primary { padding: 11px 20px; font-size: 14px; width: 100%; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .type-btn { padding: 10px 6px; font-size: 12px; }
    .acct-type-btn { padding: 10px 4px; font-size: 11px; }

    /* 交易列表 */
    .txn-item { padding: 10px 10px; gap: 8px; }
    .txn-desc { font-size: 13px; }
    .txn-sub { font-size: 11px; }
    .txn-amount { font-size: 14px; }
    .txn-icon { width: 28px; height: 28px; font-size: 12px; flex-shrink: 0; }

    /* AR items */
    .ar-item { padding: 10px 10px; gap: 8px; flex-wrap: wrap; }

    /* 區段標題 */
    .section-title { font-size: 13px; }
    .section-header { margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }

    /* 篩選列 */
    .filter-row { gap: 6px; }
    .filter-row select, .filter-row input[type=month] { font-size: 12px; padding: 6px 8px; max-width: 120px; }
    .asset-grid { grid-template-columns: 1fr !important; }
    .asset-grid > div { border-right: none !important; border-bottom: 0.5px solid var(--border); }
    .asset-grid > div:last-child { border-bottom: none; }
  }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f0efec;z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:40px 32px;width:300px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.12);">
    <div style="font-size:40px;margin-bottom:12px">🔒</div>
    <div style="font-size:17px;font-weight:600;color:#111;margin-bottom:20px">記帳本</div>
    <input id="pw" type="password" placeholder="輸入密碼"
      style="width:100%;padding:12px;font-size:16px;border:1.5px solid #ddd;border-radius:8px;text-align:center;font-family:inherit;background:#fafafa;color:#111;display:block;"
      onkeydown="if(event.key==='Enter')document.querySelector('#lock-screen button').click()">
    <div id="pw-err" style="color:#c0392b;font-size:12px;margin:8px 0;min-height:16px"></div>
    <button onclick="(function(){var v=document.getElementById('pw').value,P='5212';if(v===P){document.getElementById('lock-screen').style.display='none';try{sessionStorage.setItem('_u','1');}catch(e){}}else{document.getElementById('pw-err').textContent='密碼錯誤';document.getElementById('pw').value='';document.getElementById('pw').focus();}})()"
      style="width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">進入</button>
  </div>
</div>
<script>try{if(sessionStorage.getItem('_u')==='1'){document.getElementById('lock-screen').style.display='none';}}catch(e){}</script>




<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;margin-bottom:4px">
    <span id="sync-status" style="font-size:12px;color:#BA7517">載入中...</span>
    <button onclick="reloadData()" class="btn-data" style="font-size:12px;padding:5px 12px">↻ 重整</button>
  </div>
  <div class="topbar">
    <h1>記帳本</h1>
    <div class="topbar-right">
      <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard',this)">總覽</button>
        <button class="tab-btn" onclick="switchTab('txn',this)">收支</button>
        <button class="tab-btn" onclick="switchTab('ar',this)">應收應付</button>
        <button class="tab-btn" onclick="switchTab('budget',this)">預算</button>
        <button class="tab-btn" onclick="switchTab('projects',this)">專案</button>
        <button class="tab-btn" onclick="switchTab('tags',this)">標籤</button>
        <button class="tab-btn" onclick="switchTab('accounts',this)">帳戶</button>
      </div>
      <button class="btn-data" onclick="exportJSON()" title="備份資料">⬇ 匯出</button>
      <label class="btn-data" style="cursor:pointer" title="還原資料">⬆ 匯入<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
      <button class="btn-data" onclick="exportCSV()" title="匯出收支明細">📊 CSV</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="panel active">
    <div id="total-asset-bar" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 24px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px"></div>
    <div id="acct-overview" class="acct-grid"></div>
    <div class="summary-grid" id="summary-cards"></div>
    <div class="two-col">
      <div class="card">
        <div class="section-header"><span class="section-title">本月支出分類</span></div>
        <div class="chart-wrap"><canvas id="pieChart" role="img" aria-label="本月支出分類圓餅圖">支出分類統計</canvas></div>
      </div>
      <div class="card">
        <div class="section-header"><span class="section-title">近6個月收支</span></div>
        <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="近6個月收支長條圖">收支趨勢</canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="section-header"><span class="section-title">最近10筆記錄</span></div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- TXN -->
  <div id="tab-txn" class="panel">

    <div class="card" style="padding:14px 12px">
      <!-- Calendar header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button onclick="calPrevMonth()" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;color:var(--text2)">‹</button>
        <span id="cal-title" style="font-size:15px;font-weight:600"></span>
        <button onclick="calNextMonth()" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;color:var(--text2)">›</button>
      </div>
      <!-- Day of week headers -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px">
        <div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">日</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">一</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">二</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">三</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">四</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">五</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">六</div>
      </div>
      <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px"></div>

      <!-- Selected day summary -->
      <div id="cal-day-summary" style="display:none;background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <span id="cal-day-label" style="font-size:13px;font-weight:500"></span>
        <div style="display:flex;gap:12px">
          <span id="cal-day-in" style="font-size:12px;color:var(--green)"></span>
          <span id="cal-day-out" style="font-size:12px;color:var(--red)"></span>
        </div>
      </div>

      <!-- Filter row -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
        <select id="filter-acct" onchange="renderTxnList()" style="font-size:12px;padding:5px 8px;font-family:inherit"><option value="">全部帳戶</option></select>
        <select id="filter-type" onchange="renderTxnList()" style="font-size:12px;padding:5px 8px;font-family:inherit"><option value="">全部</option><option value="in">收入</option><option value="out">支出</option><option value="xfer">轉帳</option></select>
        <button onclick="clearCalSel()" id="cal-clear-btn" style="display:none;font-size:12px;padding:5px 10px;border:0.5px solid var(--border2);background:transparent;border-radius:6px;cursor:pointer;color:var(--text2);font-family:inherit">✕ 清除篩選</button>
      </div>
      <input type="month" id="filter-month" style="display:none" onchange="renderTxnList()">
      <div id="txn-list"></div>
    </div>

    <!-- 桌面版隱藏表單欄位（保留供JS使用） -->
    <div style="display:none">
      <input type="number" id="txn-amount">
      <select id="txn-currency"><option>TWD</option></select>
      <input type="date" id="txn-date">
      <select id="txn-cat"></select>
      <select id="txn-acct-type"></select>
      <select id="txn-acct"></select>
      <select id="txn-to-acct"></select>
      <input type="text" id="txn-note">
      <input type="text" id="txn-tag">
      <datalist id="tag-suggestions2"></datalist>
      <select id="txn-project"></select>
      <input type="checkbox" id="txn-installment">
      <input type="number" id="txn-inst-count" value="6">
      <input type="month" id="txn-inst-start">
      <input type="number" id="txn-inst-first">
      <input type="number" id="txn-inst-each">
      <div id="txn-to-wrap"></div>
      <div id="installment-wrap"></div>
      <label id="inst-toggle-label"></label>
      <label id="txn-acct-label"></label>
    </div>
  </div>

  <!-- AR/AP -->
  <div id="tab-ar" class="panel">
    <div class="card">
      <div class="section-title">新增應收 / 應付</div>
      <div class="type-toggle">
        <button class="type-btn active-ar" onclick="setArType('ar',this)">應收</button>
        <button class="type-btn" onclick="setArType('ap',this)">應付</button>
      </div>
      <div class="form-grid" style="margin-bottom:10px">
        <div class="form-group"><label>對象名稱</label><input type="text" id="ar-name" placeholder="公司或個人"></div>
        <div class="form-group"><label>金額</label><input type="number" id="ar-amount" placeholder="0" min="0"></div>

async function saveToSupabase(data){
  try {
    // Upsert row with id=1
    const res = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer '+SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id: SB_ROW_ID, data })
    });
    if(res.ok || res.status===201){
      setSyncStatus('ok','已同步 ✓');
    } else {
      const err = await res.text();
      throw new Error(err);
    }
  } catch(e){
    setSyncStatus('err','同步失敗（已存本地）');
  }
}

function todayStr(){ return new Date().toISOString().slice(0,10); }

function twdEq(a,c){ return a*(RATES[c]||1); }
function fmt(a,c){
  const n=parseFloat(a); if(isNaN(n)) return '-';
  if(c==='JPY'||c==='KRW'||c==='IDR') return c+' '+Math.round(n).toLocaleString();
  return c+' '+n.toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:2});
}

function importJSON(e){
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(!confirm('確定要匯入？這會覆蓋目前所有資料。')) return;
      txns=d.txns||[]; arItems=d.arItems||[]; budgets=d.budgets||{}; accounts=d.accounts||[];
      sv(); refreshAcctSelects(); renderDashboard(); alert('匯入成功！');
    } catch { alert('檔案格式錯誤，請選擇正確的備份 JSON 檔。'); }
  };
  r.readAsText(file);
  e.target.value='';
}

function acctBalance(acct){
  let bal=acct.initBalance||0;
  const today=todayStr();
  txns.filter(t=>t.currency===acct.currency&&(t.acctId===acct.id||t.toAcctId===acct.id)).forEach(t=>{
    // 信用卡只計算今天或之前的交易（避免未來分期計入）
    if(acct.type==='credit' && t.date && t.date>today) return;
    if(t.type==='in'  &&t.acctId===acct.id)   bal+=t.amount;
    if(t.type==='out' &&t.acctId===acct.id)   bal-=t.amount;
    if(t.type==='xfer'&&t.acctId===acct.id)   bal-=t.amount;
    if(t.type==='xfer'&&t.toAcctId===acct.id) bal+=t.amount;
  });
  return bal;
}

function calcInstEach(){
  const amt = parseFloat(document.getElementById('txn-amount').value)||0;
  const count = parseInt(document.getElementById('txn-inst-count').value)||1;
  const first = parseFloat(document.getElementById('txn-inst-first')?.value)||0;
  const remaining = count > 1 ? count - 1 : 1;
  const each = first > 0
    ? (amt - first > 0 ? Math.ceil((amt - first) / remaining) : 0)
    : (count > 0 ? Math.ceil(amt / count) : 0);
  document.getElementById('txn-inst-each').value = each > 0 ? each : '';
}

function loanProgress(a){
  if(!a.loanMonths) return '';
  let remaining;
  if(a.loanStartDate){
    const start = new Date(a.loanStartDate);
    const now = new Date();
    const elapsed = (now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth());
    remaining = Math.max(0, a.loanMonths - elapsed);
  } else if(a.loanEndDate){
    const end = new Date(a.loanEndDate);
    const now = new Date();
    remaining = Math.max(0, (end.getFullYear()-now.getFullYear())*12 + (end.getMonth()-now.getMonth()));
  } else {
    return ' · 共 '+a.loanMonths+' 期';
  }
  const pct = Math.round(((a.loanMonths-remaining)/a.loanMonths)*100);
  return ' · 剩餘 '+remaining+' 期（已還 '+pct+'%）';
}
function nextLoanPayment(a){
  if(!a.loanDay) return '';
  const today=new Date(), d=today.getDate();
  let m=today.getMonth(), y=today.getFullYear();
  if(d>=a.loanDay){ m+=1; if(m>11){m=0;y+=1;} }
  const next=new Date(y,m,a.loanDay);
  const days=Math.round((next-today)/(1000*60*60*24));
  return `還款日 ${next.getMonth()+1}/${next.getDate()}（${days}天後）${a.loanPayment?' · '+next.toLocaleString('zh-TW',{month:'numeric',day:'numeric'}):''}`;
}
function nextBillInfo(a){
  if(!a.billDay) return '';
  const today=new Date();
  const d=today.getDate();
  let billMonth=today.getMonth(), billYear=today.getFullYear();
  if(d >= a.billDay){ billMonth+=1; if(billMonth>11){billMonth=0;billYear+=1;} }
  const billDate=new Date(billYear,billMonth,a.billDay);
  const daysLeft=Math.round((billDate-today)/(1000*60*60*24));
  let dueStr='';
  if(a.dueDays){
    const dueDate=new Date(billDate); dueDate.setDate(dueDate.getDate()+a.dueDays);
    dueStr=' · 繳款 '+(dueDate.getMonth()+1)+'/'+(dueDate.getDate());
  }
  return `結帳 ${billDate.getMonth()+1}/${billDate.getDate()}（${daysLeft}天後）${dueStr}`;
}

function addTxn(){
  const amt=parseFloat(document.getElementById('txn-amount').value);
  if(!amt||amt<=0){alert('請輸入有效金額');return;}
  const acctId=parseInt(document.getElementById('txn-acct').value)||null;
  const toAcctId=currentType==='xfer'?(parseInt(document.getElementById('txn-to-acct').value)||null):null;
  if(currentType==='xfer'&&acctId===toAcctId){alert('轉出與轉入帳戶不能相同');return;}

  const isInstallment = document.getElementById('txn-installment')?.checked && currentType==='out';
  if(isInstallment){
    const count = parseInt(document.getElementById('txn-inst-count').value)||1;
    const startMonth = document.getElementById('txn-inst-start').value || thisMonth();
    const each = Math.ceil(amt/count);
    const note = document.getElementById('txn-note').value;
    const cat = document.getElementById('txn-cat').value;
    const cur = document.getElementById('txn-currency').value;
    const instId = Date.now(); // group id
    for(let i=0;i<count;i++){
      const d = new Date(startMonth+'-01');
      d.setMonth(d.getMonth()+i);
      const dateStr = d.toISOString().slice(0,7)+'-01';
      // Last period gets remainder
      const periodAmt = i===count-1 ? (amt-(each*(count-1))) : each;
      txns.unshift({
        id: instId+i, type:'out', amount:periodAmt,
        currency:cur, cat, date:dateStr,
        note: note ? note+' ('+(i+1)+'/'+count+')' : '分期'+(i+1)+'/'+count,
        acctId, toAcctId:null,
        installmentGroup:instId, installmentIdx:i+1, installmentTotal:count, project:projId
      });
    }
    txns.sort((a,b)=>b.date.localeCompare(a.date));
    alert('已新增 '+count+' 筆分期記錄（'+each+' '+document.getElementById('txn-currency').value+'/期）');
  } else {
    txns.unshift({id:Date.now(),type:currentType,amount:amt,
      currency:document.getElementById('txn-currency').value,
      cat:document.getElementById('txn-cat').value,
      date:document.getElementById('txn-date').value||todayStr(),
      note:document.getElementById('txn-note').value,
      tag:document.getElementById('txn-tag')?.value.trim()||null,
      project:document.getElementById('txn-project').value||null,
      acctId,toAcctId});
  }
  sv();
  document.getElementById('txn-amount').value='';
  document.getElementById('txn-note').value='';
  if(document.getElementById('txn-installment')) document.getElementById('txn-installment').checked=false;
  document.getElementById('installment-wrap').style.display='none';
  renderTxnList(); renderAcctOverview();
}

        </div>

  }

function doDeleteTxn(id, mode){
  const t=txns.find(x=>x.id===id);
  if(!t) return;
  const today=todayStr();
  if(mode==='single'){
    txns=txns.filter(x=>x.id!==id);
  } else if(mode==='future'){
    txns=txns.filter(x=>!(x.installmentGroup===t.installmentGroup&&x.date>=today));
  } else if(mode==='all'){
    txns=txns.filter(x=>x.installmentGroup!==t.installmentGroup);
  }
  sv(); closeEdit(); renderTxnList(); renderAcctOverview(); renderDashboard();
}

/* ── Calendar ── */
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed
let calSelectedDate = null;

function calPrevMonth(){
  calMonth--; if(calMonth<0){calMonth=11;calYear--;}
  calSelectedDate=null;
  renderCalendar(); renderTxnList();
}
function calNextMonth(){
  calMonth++; if(calMonth>11){calMonth=0;calYear++;}
  calSelectedDate=null;
  renderCalendar(); renderTxnList();
}
function clearCalSel(){
  calSelectedDate=null;
  renderCalendar(); renderTxnList();
}
function calSelectDay(dateStr, el){
  calSelectedDate = calSelectedDate===dateStr ? null : dateStr;
  renderCalendar();
  renderTxnList();
}
function renderCalendar(){
  const grid = document.getElementById('cal-grid');
  const title = document.getElementById('cal-title');
  if(!grid||!title) return;

  title.textContent = calYear+'年'+(calMonth+1)+'月';

  // Build date -> txn map
  const monthStr = calYear+'-'+(String(calMonth+1).padStart(2,'0'));
  const fmEl2=document.getElementById('filter-month'); if(fmEl2) fmEl2.value=monthStr;

  const dayMap = {};
  txns.filter(t=>t.date&&t.date.startsWith(monthStr)).forEach(t=>{
    const d = t.date.slice(0,10);
    if(!dayMap[d]) dayMap[d]={in:0,out:0};
    if(t.type==='in') dayMap[d].in+=twdEq(t.amount,t.currency);
    if(t.type==='out') dayMap[d].out+=twdEq(t.amount,t.currency);
  });

  const firstDay = new Date(calYear,calMonth,1).getDay();
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const today = todayStr();

  let html = '';
  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+='<div></div>';

  for(let d=1;d<=daysInMonth;d++){
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const hasTxn = dayMap[dateStr];
    const isToday = dateStr===today;
    const isSelected = dateStr===calSelectedDate;
    const hasIn = hasTxn&&hasTxn.in>0;
    const hasOut = hasTxn&&hasTxn.out>0;

    html += `<div onclick="calSelectDay('${dateStr}',this)" style="
      text-align:center;padding:4px 2px;border-radius:8px;cursor:pointer;
      background:${isSelected?'var(--text)':isToday?'var(--bg2)':'transparent'};
      color:${isSelected?'var(--bg)':isToday?'var(--text)':'var(--text)'};
      border:${isToday&&!isSelected?'1.5px solid var(--border2)':'1.5px solid transparent'};
      transition:all .1s;
    ">
      <div style="font-size:13px;font-weight:${isToday?'600':'400'}">${d}</div>
      <div style="display:flex;justify-content:center;gap:2px;margin-top:2px;min-height:6px">
        ${hasIn?'<div style="width:5px;height:5px;border-radius:50%;background:var(--green)"></div>':''}
        ${hasOut?'<div style="width:5px;height:5px;border-radius:50%;background:var(--red)"></div>':''}
      </div>
    </div>`;
  }
  grid.innerHTML = html;

  // Update day summary
  const sumEl = document.getElementById('cal-day-summary');
  const labelEl = document.getElementById('cal-day-label');
  const inEl = document.getElementById('cal-day-in');
  const outEl = document.getElementById('cal-day-out');
  const clearBtn = document.getElementById('cal-clear-btn');

  if(calSelectedDate && dayMap[calSelectedDate]){
    const d = dayMap[calSelectedDate];
    if(sumEl) sumEl.style.display='flex';
    if(labelEl) labelEl.textContent = calSelectedDate;
    if(inEl) inEl.textContent = d.in>0?'+'+Math.round(d.in).toLocaleString():'';
    if(outEl) outEl.textContent = d.out>0?'-'+Math.round(d.out).toLocaleString():'';
    if(clearBtn) clearBtn.style.display='';
  } else {
    if(sumEl) sumEl.style.display='none';
    if(clearBtn) clearBtn.style.display='none';
  }
}

function renderTxnList(){
  const fa=document.getElementById('filter-acct').value;
  const ft=document.getElementById('filter-type').value;
  const monthStr = calYear+'-'+String(calMonth+1).padStart(2,'0');
  let list=txns.filter(t=>t.date&&t.date.startsWith(monthStr));
  if(calSelectedDate) list=list.filter(t=>t.date&&t.date.startsWith(calSelectedDate));
  if(fa) list=list.filter(t=>String(t.acctId)===fa||String(t.toAcctId)===fa);
  if(ft) list=list.filter(t=>t.type===ft);
  const el=document.getElementById('txn-list');
  if(!list.length){el.innerHTML='<div class="empty-state">尚無記錄</div>';return;}
  el.innerHTML=list.map(t=>{
    const bg=t.type==='in'?'var(--green-bg)':t.type==='out'?'var(--red-bg)':'var(--purple-bg)';
    const ic=t.type==='in'?'+':t.type==='out'?'-':'⇄';
    const c=t.type==='in'?'var(--green)':t.type==='out'?'var(--red)':'var(--purple)';
    const s=t.type==='in'?'+':t.type==='out'?'-':'';
    const badge=`<span class="badge badge-${t.type}">${t.type==='in'?'收入':t.type==='out'?'支出':'轉帳'}</span>`;
    const an=t.acctId?acctName(t.acctId):'';
    const tn=t.toAcctId?' → '+acctName(t.toAcctId):'';
    return `<div class="txn-item">
      <div class="txn-icon" style="background:${bg}">${ic}</div>
      <div class="txn-meta">
        <div class="txn-desc">${t.cat}${t.note?' · '+t.note:''}</div>
        <div class="txn-sub">${t.date} ${badge}${an?' · '+an+tn:''}${t.tag?` <span style="background:var(--blue-bg);color:var(--blue);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:500">#${t.tag}</span>`:''}${t.project?` · <span style="background:${(projects.find(p=>String(p.id)===String(t.project))||{}).color||'var(--blue)'};color:#fff;padding:1px 6px;border-radius:8px;font-size:10px">${(projects.find(p=>String(p.id)===String(t.project))||{}).name||''}</span>`:''}</div>
      </div>
      <div class="txn-amount" style="color:${c}">${s}${fmt(t.amount,t.currency)}</div>
      <button class="btn-sm" onclick="editTxn(${t.id})">編輯</button>
      <button class="btn-sm danger" onclick="deleteTxn(${t.id})">刪除</button>
    </div>`;
  }).join('');
}

function addCat(){

function removeCat(btn){ const name = typeof btn === 'string' ? btn : btn.dataset.cat;
  if(CATS_OUT.length<=1){alert('至少保留一個分類');return;}
  if(!confirm('刪除「'+name+'」分類？已記錄的交易不受影響。')) return;
  CATS_OUT=CATS_OUT.filter(c=>c!==name);
  delete budgets[name];
  sv(); renderCatList(); renderBudget();

function renderBudget(){
  document.getElementById('budget-form').innerHTML='<div class="form-grid">'+
    CATS_OUT.map(c=>`<div class="form-group"><label>${c}</label>
    <input type="number" id="bgt-${c}" value="${budgets[c]||''}" placeholder="0" min="0" step="100"></div>`).join('')+'</div>';
  const m=thisMonth(), spent={};
  txns.filter(t=>t.type==='out'&&t.date.startsWith(m)&&t.currency==='TWD').forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount;});
  const prog=document.getElementById('budget-progress');
  const bCats=CATS_OUT.filter(c=>budgets[c]>0);
  const sumEl = document.getElementById('budget-summary');
  if(!bCats.length){
    prog.innerHTML='<div class="empty-state">請先設定預算</div>';
    if(sumEl) sumEl.innerHTML='';
    return;
  }
  // 加總
  const totalBudget = bCats.reduce((s,c)=>s+(budgets[c]||0),0);
  const totalSpent  = bCats.reduce((s,c)=>s+(spent[c]||0),0);
  const totalPct    = totalBudget>0?Math.min(100,(totalSpent/totalBudget)*100):0;
  const totalOver   = totalSpent>totalBudget;
  const totalCol    = totalPct<70?'var(--green)':totalPct<90?'var(--amber)':'var(--red)';

  // Render top summary card
  if(sumEl){
    const netBudget = totalBudget - totalSpent;
    const sumColor = totalOver?'var(--red)':totalPct>70?'var(--amber)':'var(--green)';
    sumEl.innerHTML = `<div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:4px">
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">本月預算</div>
        <div style="font-size:22px;font-weight:600">${totalBudget.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--text2)">TWD</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">已使用</div>
        <div style="font-size:22px;font-weight:600;color:${sumColor}">${totalSpent.toLocaleString()}</div>
        <div style="font-size:11px;color:${sumColor}">${totalPct.toFixed(1)}%</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">${totalOver?'超支':'剩餘'}</div>
        <div style="font-size:22px;font-weight:600;color:${totalOver?'var(--red)':'var(--green)'}">${Math.abs(netBudget).toLocaleString()}</div>
        <div style="font-size:11px;color:var(--text2)">TWD</div>
      </div>
    </div>`;
  }

  prog.innerHTML = bCats.map(c=>{
    const b=budgets[c]||0,s=spent[c]||0,pct=b>0?Math.min(100,(s/b)*100):0,over=s>b;
    const col=pct<70?'var(--green)':pct<90?'var(--amber)':'var(--red)';
    return `<div class="budget-bar-wrap">
      <div class="budget-bar-info">
        <span>${c}</span>
        <span style="color:${over?'var(--red)':'var(--text2)'}">
          ${s.toLocaleString()} / ${b.toLocaleString()} TWD
          <strong style="color:${col};margin-left:6px">${pct.toFixed(1)}%</strong>
          ${over?' (超支)':''}
        </span>
      </div>
      <div class="budget-bar-track"><div class="budget-bar-fill" style="width:${pct.toFixed(1)}%;background:${col}"></div></div>
    </div>`;
  }).join('');
}
function saveBudgets(){
  CATS_OUT.forEach(c=>{const v=parseFloat(document.getElementById('bgt-'+c)?.value);if(v>0)budgets[c]=v;else delete budgets[c];});
  sv(); renderBudget(); alert('預算已儲存');
}

/* ── total assets ── */
function renderTotalAssets(){
  const el=document.getElementById('total-asset-bar');
  if(!accounts.length){el.innerHTML='<span style="font-size:14px;color:var(--text2)">前往帳戶頁新增帳戶以計算總資產</span>';return;}

  const bankTotal  =accounts.filter(a=>a.type==='bank') .reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const cashTotal  =accounts.filter(a=>a.type==='cash'||a.type==='prepaid') .reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const investTotal=accounts.filter(a=>a.type==='invest').reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const cryptoTotal=accounts.filter(a=>a.type==='crypto').reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const totalAsset =bankTotal+cashTotal+investTotal+cryptoTotal;

  // 信用卡：只在帳單日到付款截止日之間才計入負債
  const today=new Date(); today.setHours(0,0,0,0);
  const creditDebt=accounts.filter(a=>a.type==='credit').reduce((s,a)=>{
    const b=acctBalance(a);
    if(b>=0) return s;
    // 如果有設定帳單日，才判斷是否到期
    if(a.billDay){
      const billDay=parseInt(a.billDay)||0;
      if(billDay>0){
        // 找最近的帳單日
        const thisMonth=new Date(today.getFullYear(),today.getMonth(),billDay);
        const lastMonth=new Date(today.getFullYear(),today.getMonth()-1,billDay);
        const billDate=today>=thisMonth?thisMonth:lastMonth;
        // 只有帳單日已到，才計入負債
        if(today<billDate) return s;
      }
    }
    return s+Math.abs(twdEq(b,a.currency));
  },0);
  const loanDebt  =accounts.filter(a=>a.type==='loan')  .reduce((s,a)=>{const b=acctBalance(a);return s+(b<0?Math.abs(twdEq(b,a.currency)):0);},0);
  const totalLiab =creditDebt+loanDebt;
  const net=totalAsset-totalLiab;
  const ratio=totalAsset>0?Math.min(100,(net/totalAsset)*100):0;

  function row(icon,label,val,color){
    if(Math.abs(val)<0.5) return '';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border)"><span style="font-size:13px;color:var(--text2)">'+icon+' '+label+'</span><span style="font-size:13px;font-weight:500;color:'+(color||'var(--text)')+'">'+Math.round(val).toLocaleString()+'</span></div>';
  }

  el.style.cssText='border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0;margin-bottom:14px;overflow:hidden;background:var(--bg);width:100%';
  el.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;width:100%" class="asset-grid">'+
    '<div style="padding:16px 18px;border-right:0.5px solid var(--border)">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">資產</div>'+
      row('🏦','銀行',bankTotal)+
      row('💵','現金 / 儲值',cashTotal)+
      row('📈','投資',investTotal)+
      row('🪙','加密貨幣',cryptoTotal)+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px">'+
        '<span style="font-size:12px;color:var(--text2)">小計</span>'+
        '<span style="font-size:17px;font-weight:700;color:var(--green)">'+Math.round(totalAsset).toLocaleString('zh-TW')+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="padding:16px 18px;border-right:0.5px solid var(--border)">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">負債</div>'+
      row('💳','信用卡',creditDebt,'var(--red)')+
      row('🏛','貸款',loanDebt,'var(--red)')+
      (totalLiab<0.5?'<div style="font-size:13px;color:var(--text3);padding:5px 0">無負債</div>':'')+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px">'+
        '<span style="font-size:12px;color:var(--text2)">小計</span>'+
        '<span style="font-size:17px;font-weight:700;color:'+(totalLiab>0?'var(--red)':'var(--text2)')+'">'+Math.round(totalLiab).toLocaleString()+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="padding:16px 18px;background:'+(net>=0?'var(--green-bg)':'var(--red-bg)')+'">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">淨資產</div>'+
      '<div style="font-size:28px;font-weight:700;color:'+(net>=0?'var(--green)':'var(--red)')+'">'+Math.round(net).toLocaleString()+'</div>'+
      '<div style="font-size:11px;color:var(--text2);margin-top:4px;margin-bottom:12px">≈ TWD</div>'+

        '<div style="height:100%;border-radius:3px;background:'+(net>=0?'var(--green)':'var(--red)')+'transition:width .4s;width:'+ratio.toFixed(1)+'%"></div>'+

function buildAcctOptgroups(curId){
  const groups=[
    {type:'bank',label:'🏦 銀行帳戶'},{type:'cash',label:'💵 現金'},
    {type:'prepaid',label:'🎴 預付/儲值卡'},{type:'credit',label:'💳 信用卡'},
    {type:'invest',label:'📈 投資帳戶'},{type:'crypto',label:'🪙 加密貨幣'},
    {type:'loan',label:'🏛 貸款'},
  ];
  let html='<option value="">選擇帳戶</option>';
  groups.forEach(g=>{
    const list=accounts.filter(a=>a.type===g.type);
    if(!list.length) return;
    html+=`<optgroup label="${g.label}">`;
    list.forEach(a=>{html+=`<option value="${a.id}"${String(a.id)===String(curId)?' selected':''}>${a.name} (${a.currency})</option>`;});

function toggleSheetInst(){
  const checked = document.getElementById('sheet-inst-check').checked;
  const fields = document.getElementById('sheet-inst-fields');
  if(fields) fields.style.display = checked?'grid':'none';
  if(checked) calcSheetInstEach();
}
function calcSheetInstEach(){
  const amt = parseFloat(document.getElementById('sheet-amount').value)||0;
  const count = parseInt(document.getElementById('sheet-inst-count').value)||1;
  const first = parseFloat(document.getElementById('sheet-inst-first')?.value)||0;
  const remaining = count > 1 ? count - 1 : 1;
  const each = first > 0
    ? (amt - first > 0 ? Math.ceil((amt - first) / remaining) : 0)
    : (count > 0 ? Math.ceil(amt / count) : 0);
  const el = document.getElementById('sheet-inst-each');
  if(el) el.value = each>0?each:'';
}
function addTxnFromSheet(){
  const amt=parseFloat(document.getElementById('sheet-amount').value);
  if(!amt||amt<=0){alert('請輸入有效金額');return;}
  const acctId = parseInt(document.getElementById('sheet-acct-sel')?.value)||null;
  const toAcctId = sheetType==='xfer'
    ? (parseInt(document.getElementById('sheet-to-sel')?.value)||null)
    : null;
  if(sheetType==='xfer'&&acctId===toAcctId){alert('轉出與轉入帳戶不能相同');return;}
  const cat=document.getElementById('sheet-cat').value||CATS_OUT[0];
  const cur=document.getElementById('sheet-currency').value;
  const date=document.getElementById('sheet-date').value||todayStr();
  const note=document.getElementById('sheet-note').value;
  const proj=document.getElementById('sheet-project').value||null;
  const tag=document.getElementById('sheet-tag')?.value.trim()||null;
  const isInst=document.getElementById('sheet-inst-check')?.checked && sheetType==='out';

  if(isInst){
    const count=parseInt(document.getElementById('sheet-inst-count').value)||1;
    const startMonth=document.getElementById('sheet-inst-start').value||thisMonth();
    const firstAmt=parseFloat(document.getElementById('sheet-inst-first')?.value)||0;
    const each=firstAmt>0?Math.ceil((amt-firstAmt)/(count-1||1)):Math.ceil(amt/count);
    const instId=Date.now();
    const baseDate=document.getElementById('sheet-date').value||todayStr();
    const baseDay=parseInt(baseDate.split('-')[2])||1;
    for(let i=0;i<count;i++){
      const d=new Date(startMonth+'-01');
      d.setMonth(d.getMonth()+i);
      // Use same day as base date, capped at month end
      const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
      const day=Math.min(baseDay,daysInMonth);
      const dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      const periodAmt=i===0&&firstAmt>0?firstAmt:(i===count-1?(amt-firstAmt-(each*(count-2>0?count-2:0))):each);
      txns.unshift({id:instId+i,type:'out',amount:periodAmt,currency:cur,cat,
        date:dateStr,note:note?(note+' ('+(i+1)+'/'+count+')'):'分期'+(i+1)+'/'+count,
        acctId,toAcctId:null,project:proj,tag,
        installmentGroup:instId,installmentIdx:i+1,installmentTotal:count});
    }
    txns.sort((a,b)=>b.date.localeCompare(a.date));
    alert('已新增 '+count+' 筆分期（每期 '+each+' '+cur+'）');
  } else {
    txns.unshift({id:Date.now(),type:sheetType,amount:amt,currency:cur,cat,date,note,project:proj,acctId,toAcctId,tag});
  }
  sv();
  closeAddSheet();
  document.getElementById('sheet-amount').value='';
  document.getElementById('sheet-note').value='';
  const stag=document.getElementById('sheet-tag'); if(stag) stag.value='';
  if(document.getElementById('sheet-inst-check')) document.getElementById('sheet-inst-check').checked=false;
  const sif=document.getElementById('sheet-inst-first'); if(sif) sif.value='';
  if(document.getElementById('sheet-inst-fields')) document.getElementById('sheet-inst-fields').style.display='none';
  renderCalendar(); renderTxnList(); renderAcctOverview();
}

function getAllTags(){
  const tags={};
  txns.forEach(t=>{
    if(!t.tag) return;
    if(!tags[t.tag]) tags[t.tag]={tag:t.tag,txns:[]};
    tags[t.tag].txns.push(t);
  });
  return Object.values(tags).sort((a,b)=>b.txns.length-a.txns.length);
}
function renderTags(){
  const el=document.getElementById('tag-list-panel');
  const detail=document.getElementById('tag-detail-panel');
  if(detail) detail.style.display='none';
  if(el) el.style.display='block';
  const tags=getAllTags();
  if(!tags.length){
    el.innerHTML='<div class="card"><div class="empty-state">尚無標籤<br><span style="font-size:12px;color:var(--text3)">新增記錄時在標籤欄輸入關鍵字</span></div></div>';
    return;
  }
  // Update datalist suggestions
  const allTags=[...new Set(txns.map(t=>t.tag).filter(Boolean))];
  ['tag-suggestions','tag-suggestions2'].forEach(id=>{
    const dl=document.getElementById(id);
    if(dl) dl.innerHTML=allTags.map(t=>`<option value="${t}">`).join('');
  });
  el.innerHTML='<div class="card">'+tags.map(g=>{
    const totalOut=g.txns.filter(t=>t.type==='out').reduce((s,t)=>s+twdEq(t.amount,t.currency),0);
    const totalIn=g.txns.filter(t=>t.type==='in').reduce((s,t)=>s+twdEq(t.amount,t.currency),0);
    return `<div onclick="showTagDetail('${g.tag}')" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border);cursor:pointer">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">#${g.tag}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${g.txns.length} 筆記錄</div>
      </div>
      <div style="text-align:right">
        ${totalOut>0?`<div style="font-size:13px;color:var(--red)">-${Math.round(totalOut).toLocaleString()}</div>`:''}
        ${totalIn>0?`<div style="font-size:13px;color:var(--green)">+${Math.round(totalIn).toLocaleString()}</div>`:''}
      </div>
      <span style="color:var(--text3);font-size:16px">›</span>
    </div>`;
  }).join('')+'</div>';
}
function showTagDetail(tag){
  document.getElementById('tag-list-panel').style.display='none';
  const detail=document.getElementById('tag-detail-panel');
  detail.style.display='block';
  document.getElementById('tag-detail-title').textContent='#'+tag;
  const list=txns.filter(t=>t.tag===tag).sort((a,b)=>b.date.localeCompare(a.date));
  const totalOut=list.filter(t=>t.type==='out').reduce((s,t)=>s+twdEq(t.amount,t.currency),0);
  const totalIn=list.filter(t=>t.type==='in').reduce((s,t)=>s+twdEq(t.amount,t.currency),0);
  document.getElementById('tag-detail-content').innerHTML=
    `<div class="card" style="margin-bottom:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
        <div><div style="font-size:11px;color:var(--text2)">筆數</div><div style="font-size:18px;font-weight:600">${list.length}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">支出</div><div style="font-size:18px;font-weight:600;color:var(--red)">${Math.round(totalOut).toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">收入</div><div style="font-size:18px;font-weight:600;color:var(--green)">${Math.round(totalIn).toLocaleString()}</div></div>
      </div>
    </div>
    <div class="card">`+
    list.map(t=>{
      const c=t.type==='in'?'var(--green)':t.type==='out'?'var(--red)':'var(--purple)';
      const s=t.type==='in'?'+':t.type==='out'?'-':'';
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)">
        <div style="flex:1">
          <div style="font-size:14px">${t.cat}${t.note?' · '+t.note:''}</div>
          <div style="font-size:12px;color:var(--text2)">${t.date}${t.acctId?' · '+acctName(t.acctId):''}</div>
        </div>
        <div style="font-size:14px;font-weight:500;color:${c}">${s}${fmt(t.amount,t.currency)}</div>
      </div>`;
    }).join('')+
    '</div>';
}

function previewAdj(currentBal, currency){
  const newBal=parseFloat(document.getElementById('adj-bal').value);
  const el=document.getElementById('adj-preview');
  if(isNaN(newBal)){el.textContent='輸入調整後餘額以預覽差額';el.style.background='var(--bg2)';el.style.color='var(--text2)';return;}
  const diff=newBal-currentBal;
  if(diff===0){el.textContent='餘額相同，無需調整';el.style.background='var(--bg2)';el.style.color='var(--text2)';return;}
  const isGain=diff>0;
  el.style.background=isGain?'var(--green-bg)':'var(--red-bg)';
  el.style.color=isGain?'var(--green)':'var(--red)';
  el.textContent=(isGain?'＋':'')+ fmt(diff,currency)+' '+(isGain?'（投資獲利/存入）':'（投資虧損/提出）');
}
function confirmAdjust(id, currentBal, currency){
  const newBal=parseFloat(document.getElementById('adj-bal').value);
  if(isNaN(newBal)){alert('請輸入有效金額');return;}
  const diff=newBal-currentBal;
  if(diff===0){closeEdit();return;}
  const date=document.getElementById('adj-date').value||todayStr();
  const note=document.getElementById('adj-note').value||'餘額調整';
  txns.unshift({
    id:Date.now(), type:diff>0?'in':'out',
    amount:Math.abs(diff), currency,
    cat:diff>0?'投資':'其他支出',
    date, note, acctId:id, toAcctId:null, project:null, tag:'餘額調整'
  });
  sv(); closeEdit(); renderAcctOverview(); renderDashboard();
}
