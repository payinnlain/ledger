<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳本</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeece8;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --green: #1D9E75; --red: #D85A30; --amber: #BA7517; --blue: #185FA5; --purple: #534AB7;
    --green-bg: #E1F5EE; --red-bg: #FAECE7; --amber-bg: #FAEEDA; --blue-bg: #E6F1FB; --purple-bg: #EEEDFE;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f5f5f0; --text2: #a0a09a; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #0a3324; --red-bg: #3b1a10; --amber-bg: #3b2a08; --blue-bg: #0c2440; --purple-bg: #1e1a40;
    }
  }
  html, body { height: 100%; background: var(--bg3); font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: var(--text); }
  .app { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; }

  /* topbar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 16px; flex-wrap: wrap; gap: 10px; }
  .topbar h1 { font-size: 20px; font-weight: 600; }
  .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .nav-tabs { display: flex; gap: 3px; background: var(--bg2); border-radius: var(--radius); padding: 3px; }
  .tab-btn { padding: 6px 12px; font-size: 13px; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all .15s; white-space: nowrap; }
  .tab-btn.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border2); }

  /* data buttons */
  .btn-data { padding: 6px 12px; font-size: 12px; border: 0.5px solid var(--border2); background: var(--bg); border-radius: var(--radius); cursor: pointer; color: var(--text2); font-family: inherit; }
  .btn-data:hover { background: var(--bg2); }

  /* cards */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 14px; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  /* summary grid */
  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 600; }

  /* account cards */
  .acct-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 10px; margin-bottom: 14px; }
  .acct-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; position: relative; }
  .acct-card-icon { font-size: 22px; margin-bottom: 8px; }
  .acct-card-name { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .acct-card-bal { font-size: 18px; font-weight: 600; }
  .acct-card-cur { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .acct-del { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; opacity: 0; transition: opacity .15s; }
  .acct-card:hover .acct-del { opacity: 1; }

  /* forms */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.four  { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text2); }
  input[type=text], input[type=number], input[type=date], input[type=month], select, textarea {
    font-family: inherit; font-size: 14px; padding: 8px 10px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--text2); }

  /* type toggles */
  .type-toggle { display: flex; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border2); margin-bottom: 12px; }
  .type-btn { flex: 1; padding: 9px 8px; font-size: 13px; border: none; cursor: pointer; font-family: inherit; background: var(--bg); color: var(--text2); transition: all .15s; }
  .type-btn.active-in   { background: var(--green-bg); color: var(--green); font-weight: 500; }
  .type-btn.active-out  { background: var(--red-bg);   color: var(--red);   font-weight: 500; }
  .type-btn.active-xfer { background: var(--purple-bg);color: var(--purple);font-weight: 500; }
  .type-btn.active-ar   { background: var(--blue-bg);  color: var(--blue);  font-weight: 500; }
  .type-btn.active-ap   { background: var(--amber-bg); color: var(--amber); font-weight: 500; }

  .acct-type-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
  .acct-type-btn { padding: 9px 4px; font-size: 12px; border: 0.5px solid var(--border); background: var(--bg); border-radius: var(--radius); cursor: pointer; font-family: inherit; color: var(--text2); text-align: center; }
  .acct-type-btn.selected { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }

  /* buttons */
  .btn-primary { background: var(--text); color: var(--bg); border: none; padding: 9px 22px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border: 0.5px solid var(--border2); background: transparent; border-radius: 6px; cursor: pointer; color: var(--text2); font-family: inherit; white-space: nowrap; }
  .btn-sm:hover { background: var(--bg2); }
  .btn-sm.danger:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* list items */
  .txn-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--bg); }
  .txn-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .txn-meta { flex: 1; min-width: 0; }
  .txn-desc { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .txn-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }

  /* badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-in     { background: var(--green-bg);  color: var(--green); }
  .badge-out    { background: var(--red-bg);    color: var(--red); }
  .badge-xfer   { background: var(--purple-bg); color: var(--purple); }
  .badge-paid   { background: #EAF3DE; color: #3B6D11; }
  .badge-unpaid { background: var(--amber-bg);  color: var(--amber); }
  .badge-overdue{ background: #FCEBEB; color: #A32D2D; }

  /* ar items */
  .ar-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; }
  .ar-meta { flex: 1; min-width: 0; }

  /* budget bars */
  .budget-bar-wrap { margin-bottom: 12px; }
  .budget-bar-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .budget-bar-track { height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }

  /* charts */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chart-wrap { position: relative; width: 100%; height: 220px; margin-top: 8px; }

  /* panel */
  .panel { display: none; }
  .panel.active { display: block; }
  .empty-state { text-align: center; padding: 2.5rem; color: var(--text2); font-size: 14px; }

  /* filter row */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* footer note */
  .footer-note { text-align: center; font-size: 12px; color: var(--text3); padding: 20px 0 0; }

  .chip-btn {
    padding: 7px 14px; font-size: 13px; border: 1px solid var(--border2);
    background: var(--bg); color: var(--text2); border-radius: 20px;
    cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent; min-height: 36px;
  }
  .chip-btn:active { opacity: 0.7; }
  .chip-btn.chip-active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

  @media (max-width: 640px) {
  .acct-grid { grid-template-columns: repeat(2,1fr) !important; }
    /* 基本佈局 */
    .app { padding: 0 12px 80px; }
    .topbar { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 0 12px; }
    .topbar h1 { font-size: 17px; }
    .topbar-right { width: 100%; justify-content: space-between; }

    /* 底部導覽列 */
    .nav-tabs {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 0.5px solid var(--border);
      border-radius: 0; padding: 6px 4px;
      display: flex; justify-content: space-around;
      z-index: 1000; gap: 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    }
    .nav-tabs .tab-btn {
      flex: 1; padding: 6px 2px; font-size: 11px;
      border-radius: 6px; text-align: center;
    }
    .nav-tabs .tab-btn.active {
      background: var(--bg2); border: none;
    }

    /* 匯出匯入按鈕縮小 */
    .btn-data { padding: 5px 8px; font-size: 11px; }
    #sync-status { font-size: 11px; }

    /* 格線 */
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-grid, .form-grid.three, .form-grid.four { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .acct-type-grid { grid-template-columns: repeat(3,1fr); }
    .acct-grid { grid-template-columns: repeat(2,1fr); gap: 8px; }

    /* 卡片 */
    .card { padding: 14px 12px; }
    .metric { padding: 12px 12px; }
    .metric-value { font-size: 17px; }
    .metric-label { font-size: 11px; }

    /* 帳戶卡片 */
    .acct-card { padding: 12px; }
    .acct-card-bal { font-size: 16px; }

    /* 輸入框加大點選區域 */
    input[type=text], input[type=number], input[type=date], input[type=month], select, textarea {
      font-size: 16px !important; /* 防止 iOS 自動縮放 */
      padding: 10px 10px;
    }

    /* 按鈕 */
    .btn-primary { padding: 11px 20px; font-size: 14px; width: 100%; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .type-btn { padding: 10px 6px; font-size: 12px; }
    .acct-type-btn { padding: 10px 4px; font-size: 11px; }

    /* 交易列表 */
    .txn-item { padding: 10px 10px; gap: 8px; }
    .txn-desc { font-size: 13px; }
    .txn-sub { font-size: 11px; }
    .txn-amount { font-size: 14px; }
    .txn-icon { width: 28px; height: 28px; font-size: 12px; flex-shrink: 0; }

    /* AR items */
    .ar-item { padding: 10px 10px; gap: 8px; flex-wrap: wrap; }

    /* 區段標題 */
    .section-title { font-size: 13px; }
    .section-header { margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }

    /* 篩選列 */
    .filter-row { gap: 6px; }
    .filter-row select, .filter-row input[type=month] { font-size: 12px; padding: 6px 8px; max-width: 120px; }
    .asset-grid { grid-template-columns: 1fr !important; }
    .asset-grid > div { border-right: none !important; border-bottom: 0.5px solid var(--border); }
    .asset-grid > div:last-child { border-bottom: none; }
  }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f0efec;z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:40px 32px;width:300px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.12);">
    <div style="font-size:40px;margin-bottom:12px">🔒</div>
    <div style="font-size:17px;font-weight:600;color:#111;margin-bottom:20px">記帳本</div>
    <input id="pw" type="password" placeholder="輸入密碼"
      style="width:100%;padding:12px;font-size:16px;border:1.5px solid #ddd;border-radius:8px;text-align:center;font-family:inherit;background:#fafafa;color:#111;display:block;"
      onkeydown="if(event.key==='Enter')document.querySelector('#lock-screen button').click()">
    <div id="pw-err" style="color:#c0392b;font-size:12px;margin:8px 0;min-height:16px"></div>
    <button onclick="(function(){var v=document.getElementById('pw').value,P='5212';if(v===P){document.getElementById('lock-screen').style.display='none';try{sessionStorage.setItem('_u','1');}catch(e){}}else{document.getElementById('pw-err').textContent='密碼錯誤';document.getElementById('pw').value='';document.getElementById('pw').focus();}})()"
      style="width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">進入</button>
  </div>
</div>
<script>try{if(sessionStorage.getItem('_u')==='1'){document.getElementById('lock-screen').style.display='none';}}catch(e){}</script>




<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;margin-bottom:4px">
    <span id="sync-status" style="font-size:12px;color:#BA7517">載入中...</span>
    <button onclick="reloadData()" class="btn-data" style="font-size:12px;padding:5px 12px">↻ 重整</button>
  </div>
  <div class="topbar">
    <h1>記帳本</h1>
    <div class="topbar-right">
      <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard',this)">總覽</button>
        <button class="tab-btn" onclick="switchTab('txn',this)">收支</button>
        <button class="tab-btn" onclick="switchTab('ar',this)">應收應付</button>
        <button class="tab-btn" onclick="switchTab('budget',this)">預算</button>
        <button class="tab-btn" onclick="switchTab('projects',this)">專案</button>
        <button class="tab-btn" onclick="switchTab('tags',this)">標籤</button>
        <button class="tab-btn" onclick="switchTab('accounts',this)">帳戶</button>
      </div>
      <button class="btn-data" onclick="exportJSON()" title="備份資料">⬇ 匯出</button>
      <label class="btn-data" style="cursor:pointer" title="還原資料">⬆ 匯入<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
      <button class="btn-data" onclick="exportCSV()" title="匯出收支明細">📊 CSV</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="panel active">
    <div id="total-asset-bar" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 24px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px"></div>
    <div id="due-reminder" style="margin-bottom:14px"></div>
    <div id="acct-overview"></div>

    <!-- 帳戶明細（點卡片後展開） -->
    <div id="acct-detail-panel" style="display:none;margin-bottom:14px">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:10px">
            <button onclick="closeAcctDetail()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2);padding:0;line-height:1">←</button>
            <span id="acct-detail-title" style="font-size:15px;font-weight:600"></span>
          </div>
          <div style="display:flex;gap:16px;align-items:center">
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--text2)">累計收入</div>
              <div id="acct-detail-in" style="font-size:14px;font-weight:600;color:var(--green)"></div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--text2)">累計支出</div>
              <div id="acct-detail-out" style="font-size:14px;font-weight:600;color:var(--red)"></div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--text2)">餘額</div>
              <div id="acct-detail-bal" style="font-size:16px;font-weight:700"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
          <select id="acct-detail-month" onchange="renderAcctDetail()" style="font-size:12px;padding:5px 8px;font-family:inherit;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)"></select>
          <select id="acct-detail-type" onchange="renderAcctDetail()" style="font-size:12px;padding:5px 8px;font-family:inherit;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)">
            <option value="">全部類型</option>
            <option value="in">收入</option>
            <option value="out">支出</option>
            <option value="xfer">轉帳</option>
          </select>
        </div>
        <div id="acct-detail-list"></div>
      </div>
    </div>

    <div class="summary-grid" id="summary-cards"></div>
    <div class="two-col">
      <div class="card">
        <div class="section-header"><span class="section-title">本月支出分類</span></div>
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div class="chart-wrap" style="width:160px;height:160px;flex-shrink:0"><canvas id="pieChart" role="img" aria-label="本月支出分類圓餅圖">支出分類統計</canvas></div>
          <div id="cat-spend-list" style="flex:1;overflow-y:auto;max-height:160px;padding-top:4px"></div>
        </div>
      </div>
      <div class="card">
        <div class="section-header"><span class="section-title">近6個月收支</span></div>
        <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="近6個月收支長條圖">收支趨勢</canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="section-header"><span class="section-title">最近10筆記錄</span></div>
      <div id="recent-list"></div>
    </div>
    <div class="card" id="dashboard-projects-card" style="display:none">
      <div class="section-header"><span class="section-title">專案預算</span></div>
      <div id="dashboard-projects"></div>
    </div>
  </div>

  <!-- TXN -->
  <div id="tab-txn" class="panel">

    <div class="card" style="padding:14px 12px">
      <!-- Calendar header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button onclick="calPrevMonth()" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;color:var(--text2)">‹</button>
        <span id="cal-title" style="font-size:15px;font-weight:600"></span>
        <button onclick="calNextMonth()" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;color:var(--text2)">›</button>
      </div>
      <!-- Day of week headers -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px">
        <div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">日</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">一</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">二</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">三</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">四</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">五</div><div style="font-size:11px;color:var(--text2);padding:2px;text-align:center">六</div>
      </div>
      <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px"></div>

      <!-- Selected day summary -->
      <div id="cal-day-summary" style="display:none;background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <span id="cal-day-label" style="font-size:13px;font-weight:500"></span>
        <div style="display:flex;gap:12px">
          <span id="cal-day-in" style="font-size:12px;color:var(--green)"></span>
          <span id="cal-day-out" style="font-size:12px;color:var(--red)"></span>
        </div>
      </div>

      <!-- Filter row -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center">

// ── 台灣假日資料 ──
let twHolidays = new Set(); // 'YYYY-MM-DD' 的假日集合
async function loadTwHolidays(){
  const years=[new Date().getFullYear(), new Date().getFullYear()+1];
  for(const y of years){
    try{
      const r=await fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${y}.json`);
      if(!r.ok) continue;
      const data=await r.json();
      data.forEach(d=>{
        if(d.isHoliday){
          const s=String(d.date);
          twHolidays.add(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));
        }
      });
    }catch(e){ /* 離線時靜默失敗，fallback 用週末 */ }
  }
  renderDueReminder(); // 假日資料載入後重繪提醒
}
function isHolidayDate(dateStr){
  if(twHolidays.has(dateStr)) return true;
  const dow=new Date(dateStr).getDay();
  return dow===0||dow===6;
}
// 往前找最近工作日（應收提前提醒用）
function adjustedReminderDate(dateStr){
  const d=new Date(dateStr);
  while(isHolidayDate(d.toISOString().slice(0,10))){
    d.setDate(d.getDate()-1);
  }
  return d.toISOString().slice(0,10);
}

async function saveToSupabase(data){
  try {

    const res = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer '+SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id: SB_ROW_ID, data })
    });
    if(res.ok || res.status===201){
      setSyncStatus('ok','已同步 ✓');
    } else {
      const err = await res.text();
      throw new Error(err);
    }
  } catch(e){
    setSyncStatus('err','同步失敗（已存本地）');
  }
}

function acctBalance(acct){
  let bal=acct.initBalance||0;
  const today=todayStr();
  txns.filter(t=>t.currency===acct.currency&&(t.acctId===acct.id||t.toAcctId===acct.id)).forEach(t=>{
    // 信用卡只計算今天或之前的交易（避免未來分期計入）
    if(acct.type==='credit' && t.date && t.date>today) return;
    if(t.type==='in'  &&t.acctId===acct.id)   bal+=t.amount;
    if(t.type==='out' &&t.acctId===acct.id)   bal-=t.amount;
    if(t.type==='xfer'&&t.acctId===acct.id)   bal-=t.amount;
    if(t.type==='xfer'&&t.toAcctId===acct.id) bal+=t.amount;
  });
  return bal;
}

function saveAccountEdit(id){
  const a=accounts.find(x=>x.id===id); if(!a) return;
  const name=document.getElementById('ea-name').value.trim();
  if(!name){alert('請輸入帳戶名稱');return;}
  a.name=name;
  a.type=document.getElementById('ea-type').value;
  a.currency=document.getElementById('ea-cur').value;
  a.initBalance=parseFloat(document.getElementById('ea-bal').value)||0;
  if(a.type==='credit'){
    a.billDay=parseInt(document.getElementById('ea-billday')?.value)||null;
    a.dueDays=parseInt(document.getElementById('ea-duedays')?.value)||null;
    a.creditLimit=parseFloat(document.getElementById('ea-limit')?.value)||null;
    a.loanTotal=null; a.loanRate=null; a.loanDay=null; a.loanPayment=null;

function toggleInstallment(){

function calcInstEach(){
  const amt = parseFloat(document.getElementById('txn-amount').value)||0;
  const count = parseInt(document.getElementById('txn-inst-count').value)||1;
  const first = parseFloat(document.getElementById('txn-inst-first')?.value)||0;
  const remaining = count > 1 ? count - 1 : 1;
  const each = first > 0
    ? (amt - first > 0 ? Math.ceil((amt - first) / remaining) : 0)
    : (count > 0 ? Math.ceil(amt / count) : 0);
  document.getElementById('txn-inst-each').value = each > 0 ? each : '';
}

function loanProgress(a){
  if(!a.loanMonths) return '';
  let remaining;
  if(a.loanStartDate){
    const start = new Date(a.loanStartDate);
    const now = new Date();
    const elapsed = (now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth());
    remaining = Math.max(0, a.loanMonths - elapsed);
  } else if(a.loanEndDate){
    const end = new Date(a.loanEndDate);
    const now = new Date();
    remaining = Math.max(0, (end.getFullYear()-now.getFullYear())*12 + (end.getMonth()-now.getMonth()));
  } else {
    return ' · 共 '+a.loanMonths+' 期';
  }
  const pct = Math.round(((a.loanMonths-remaining)/a.loanMonths)*100);
  return ' · 剩餘 '+remaining+' 期（已還 '+pct+'%）';
}
function nextLoanPayment(a){
  if(!a.loanDay) return '';
  const today=new Date(), d=today.getDate();
  let m=today.getMonth(), y=today.getFullYear();
  if(d>=a.loanDay){ m+=1; if(m>11){m=0;y+=1;} }
  const next=new Date(y,m,a.loanDay);
  const days=Math.round((next-today)/(1000*60*60*24));
  return `還款日 ${next.getMonth()+1}/${next.getDate()}（${days}天後）${a.loanPayment?' · '+next.toLocaleString('zh-TW',{month:'numeric',day:'numeric'}):''}`;
}
function nextBillInfo(a){
  if(!a.billDay) return '';
  const today=new Date();
  const d=today.getDate();
  let billMonth=today.getMonth(), billYear=today.getFullYear();
  if(d >= a.billDay){ billMonth+=1; if(billMonth>11){billMonth=0;billYear+=1;} }
  const billDate=new Date(billYear,billMonth,a.billDay);
  const daysLeft=Math.round((billDate-today)/(1000*60*60*24));
  let dueStr='';
  if(a.dueDays){
    const dueDate=new Date(billDate); dueDate.setDate(dueDate.getDate()+a.dueDays);
    dueStr=' · 繳款 '+(dueDate.getMonth()+1)+'/'+(dueDate.getDate());
  }
  return `結帳 ${billDate.getMonth()+1}/${billDate.getDate()}（${daysLeft}天後）${dueStr}`;
}
function renderAcctOverview(){
  const el=document.getElementById('acct-overview');
  if(!accounts.length){el.innerHTML='';return;}
  const typeOrder=['invest','crypto','bank','credit','cash','prepaid','loan'];
  const typeColors={
    'bank':  {bg:'#EFF6FF',text:'#185FA5',border:'#93C5FD'},
    'cash':  {bg:'#ECFDF5',text:'#0F6E56',border:'#6EE7B7'},
    'prepaid':{bg:'#FFF7ED',text:'#9A3412',border:'#FDBA74'},
    'credit':{bg:'#FEF2F2',text:'#991B1B',border:'#FCA5A5'},
    'invest':{bg:'#EEF2FF',text:'#3730A3',border:'#A5B4FC'},
    'crypto':{bg:'#F5F3FF',text:'#6D28D9',border:'#C4B5FD'},
    'loan':  {bg:'#F9FAFB',text:'#374151',border:'#D1D5DB'},
  };
  const typeLabel={'bank':'🏦 銀行','cash':'💵 現金','prepaid':'🎴 儲值',
    'credit':'💳 信用卡','invest':'📈 投資','crypto':'🪙 加密','loan':'🏛 貸款'};

  const typeGroupLabel={'bank':'🏦 銀行帳戶','cash':'💵 現金','prepaid':'🎴 預付/儲值','credit':'💳 信用卡','invest':'📈 投資帳戶','crypto':'🪙 加密貨幣','loan':'🏛 貸款'};
  let html='';
  typeOrder.forEach(type=>{
    const group=accounts.filter(a=>a.type===type);
    if(!group.length) return;
    const col=typeColors[type]||{bg:'#F9FAFB',text:'#374151',border:'#D1D5DB'};
    html+=`<div style="margin-bottom:14px">
      <div style="font-size:11px;color:#aaa;font-weight:500;margin-bottom:6px;letter-spacing:.3px">${typeGroupLabel[type]||type}</div>
      <div class="acct-grid" data-type="${type}" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"
        ondragover="event.preventDefault()" ondrop="acctDropGroup(event,'${type}')">`;
    group.forEach(a=>{
      const bal=acctBalance(a);
      const balColor=a.type==='credit'?(bal<0?'var(--red)':'var(--green)'):(bal>=0?'var(--green)':'var(--red)');
      const loanInfo=a.type==='loan'&&a.loanDay?`<div style="font-size:10px;color:${col.text};opacity:0.7;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nextLoanPayment(a)}</div>`:'';
      const creditInfo=a.type==='credit'&&a.billDay?`<div style="font-size:10px;color:${col.text};opacity:0.7;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nextBillInfo(a)}</div>`:'';
      // Credit card: split using bill date
      const today2=todayStr();
      // Calculate last bill date and next bill date
      let lastBillStr='', nextBillStr='';
      if(a.type==='credit'&&a.billDay){
        const td=new Date(); td.setHours(0,0,0,0);
        const d=td.getDate();
        // currBillStr = most recent past bill date (the closing date of current period)
        // prevBillStr = one month before currBillStr (the opening date of current period)
        let currBill, prevBill;
        if(d>=a.billDay){
          // today >= billDay: current bill date = this month's billDay
          currBill=new Date(td.getFullYear(),td.getMonth(),a.billDay);
        } else {
          // today < billDay: current bill date = last month's billDay
          currBill=new Date(td.getFullYear(),td.getMonth()-1,a.billDay);
        }
        prevBill=new Date(currBill.getFullYear(),currBill.getMonth()-1,a.billDay);
        lastBillStr=prevBill.getFullYear()+'-'+String(prevBill.getMonth()+1).padStart(2,'0')+'-'+String(a.billDay).padStart(2,'0');
        nextBillStr=currBill.getFullYear()+'-'+String(currBill.getMonth()+1).padStart(2,'0')+'-'+String(a.billDay).padStart(2,'0');
      }
      // Future installments = date > today (not yet billed)
      const futureTxns=a.type==='credit'?txns.filter(t=>t.acctId===a.id&&t.currency===a.currency&&t.date>today2&&t.installmentGroup):[];
      const futureAmt=futureTxns.reduce((s,t)=>s+(t.type==='out'?t.amount:0),0);
      // This period = between last bill date and next bill date (excluding future installments)
      const thisBillTxns=a.type==='credit'&&lastBillStr&&nextBillStr
        ?txns.filter(t=>t.acctId===a.id&&t.currency===a.currency&&t.date>=lastBillStr&&t.date<=nextBillStr)
        :[];
      const thisBillAmt=thisBillTxns.reduce((s,t)=>s+(t.type==='out'?t.amount:-(t.amount)),0);
      // Current used = total balance excluding future installments
      const currentUsed=Math.abs(Math.min(0,bal))-futureAmt;
      const availCredit=a.type==='credit'&&a.creditLimit?`<div style="font-size:10px;color:${col.text};opacity:0.7;margin-top:1px">可用 ${fmt(a.creditLimit-Math.max(0,currentUsed)-futureAmt,a.currency)}</div>`:'';
      // New spending = after current bill date, today or before, non-installment
      const newSpendTxns=a.type==='credit'&&nextBillStr
        ?txns.filter(t=>t.acctId===a.id&&t.currency===a.currency&&t.date>nextBillStr&&t.date<=today2&&!t.installmentGroup)
        :[];
      const newSpendAmt=newSpendTxns.reduce((s,t)=>s+(t.type==='out'?t.amount:-(t.amount)),0);
      const creditSplit=a.type==='credit'&&(futureAmt>0||lastBillStr)?
        `<div style="margin-top:4px;padding-top:4px;border-top:0.5px solid ${col.border}">
          ${thisBillAmt>0?`<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:1px">
            <span style="color:${col.text};opacity:0.7">本期帳單</span>
            <span style="color:var(--red);font-weight:500">${fmt(thisBillAmt,a.currency)}</span>
          </div>`:''}
          ${newSpendAmt>0?`<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:1px">
            <span style="color:${col.text};opacity:0.7">新消費</span>
            <span style="color:var(--red)">${fmt(newSpendAmt,a.currency)}</span>
          </div>`:''}
          ${futureAmt>0?`<div style="display:flex;justify-content:space-between;font-size:10px">
            <span style="color:${col.text};opacity:0.7">未來分期</span>
            <span style="color:var(--text2)">${fmt(futureAmt,a.currency)}</span>
          </div>`:''}
        </div>`:'';
      const loanBtn=a.type==='loan'&&a.loanPayment
        ?`<button onclick="quickLoanPayment(${a.id})" style="margin-top:6px;width:100%;padding:4px;background:${col.text};color:#fff;border:none;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit">還款</button>`:'';
      const adjBtn=(a.type==='invest'||a.type==='crypto'||a.type==='bank'||a.type==='cash'||a.type==='prepaid')
        ?`<button onclick="quickAdjustBalance(${a.id})" style="margin-top:6px;width:100%;padding:4px;background:transparent;color:${col.text};border:0.5px solid ${col.border};border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit">調整餘額</button>`
        :a.type==='credit'
        ?`<button onclick="quickAdjustCredit(${a.id})" style="margin-top:6px;width:100%;padding:4px;background:transparent;color:${col.text};border:0.5px solid ${col.border};border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit">對帳調整</button>`
        :'';
      html+=`<div draggable="true" data-acct-id="${a.id}"
        ondragstart="acctDragStart(event,${a.id})"
        ondragover="acctDragOver(event)"
        ondragleave="acctDragLeave(event)"
        ondrop="acctDrop(event,${a.id})"
        ondragend="acctDragEnd(event)"
        style="background:${col.bg};border:0.5px solid ${col.border};border-radius:var(--radius);padding:10px 10px 8px;position:relative;display:flex;flex-direction:column;cursor:pointer;transition:box-shadow .15s,opacity .15s" onclick="drillDownAcct(${a.id},event)">
        <button onclick="deleteAccount(${a.id})" style="position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;color:${col.text};opacity:0.4;font-size:10px;padding:2px;line-height:1">✕</button>

// --- Drag-and-drop account reorder (within same type group) ---
let _dragAcctId=null;
function acctDragStart(e,id){
  _dragAcctId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.currentTarget.style.opacity='0.4',0);
}
function acctDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.boxShadow='0 0 0 2px var(--green)';
}
function acctDragLeave(e){
  e.currentTarget.style.boxShadow='';
}
function acctDrop(e,targetId){
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.style.boxShadow='';
  if(_dragAcctId===null||_dragAcctId===targetId) return;
  const fromAcct=accounts.find(a=>a.id===_dragAcctId);
  const toAcct=accounts.find(a=>a.id===targetId);
  if(!fromAcct||!toAcct||fromAcct.type!==toAcct.type) return;
  const fromIdx=accounts.indexOf(fromAcct);
  const toIdx=accounts.indexOf(toAcct);
  accounts.splice(fromIdx,1);
  accounts.splice(toIdx,0,fromAcct);
  sv(); renderAcctOverview(); refreshAcctSelects();
}
function acctDragEnd(e){
  e.currentTarget.style.opacity='';
  e.currentTarget.style.boxShadow='';
  _dragAcctId=null;
}

function isCryptoAcct(id){
  return accounts.find(a=>a.id===id)?.type==='crypto';
}
function populateCats(){

  let cats;
  if(selAcctId&&isCryptoAcct(selAcctId)){cats=CATS_CRYPTO;}

function addTxn(){
  const amt=parseFloat(document.getElementById('txn-amount').value);
  if(!amt||amt<=0){alert('請輸入有效金額');return;}
  const acctId=parseInt(document.getElementById('txn-acct').value)||null;
  const toAcctId=currentType==='xfer'?(parseInt(document.getElementById('txn-to-acct').value)||null):null;
  if(currentType==='xfer'&&acctId===toAcctId){alert('轉出與轉入帳戶不能相同');return;}

  const isInstallment = document.getElementById('txn-installment')?.checked && currentType==='out';
  if(isInstallment){
    const count = parseInt(document.getElementById('txn-inst-count').value)||1;
    const startMonth = document.getElementById('txn-inst-start').value || thisMonth();
    const each = Math.ceil(amt/count);
    const note = document.getElementById('txn-note').value;
    const cat = document.getElementById('txn-cat').value;
    const cur = document.getElementById('txn-currency').value;
    const instId = Date.now(); // group id
    for(let i=0;i<count;i++){
      const d = new Date(startMonth+'-01');
      d.setMonth(d.getMonth()+i);
      const dateStr = d.toISOString().slice(0,7)+'-01';
      // Last period gets remainder
      const periodAmt = i===count-1 ? (amt-(each*(count-1))) : each;
      txns.unshift({
        id: instId+i, type:'out', amount:periodAmt,
        currency:cur, cat, date:dateStr,
        note: note ? note+' ('+(i+1)+'/'+count+')' : '分期'+(i+1)+'/'+count,
        acctId, toAcctId:null,
        installmentGroup:instId, installmentIdx:i+1, installmentTotal:count, project:projId
      });
    }
    txns.sort((a,b)=>b.date.localeCompare(a.date));
    alert('已新增 '+count+' 筆分期記錄（'+each+' '+document.getElementById('txn-currency').value+'/期）');
  } else {
    txns.unshift({id:Date.now(),type:currentType,amount:amt,
      currency:document.getElementById('txn-currency').value,
      cat:document.getElementById('txn-cat').value,
      date:document.getElementById('txn-date').value||todayStr(),
      note:document.getElementById('txn-note').value,
      tag:document.getElementById('txn-tag')?.value.trim()||null,
      project:document.getElementById('txn-project').value||null,
      acctId,toAcctId});
  }
  sv();
  document.getElementById('txn-amount').value='';
  document.getElementById('txn-note').value='';
  if(document.getElementById('txn-installment')) document.getElementById('txn-installment').checked=false;
  document.getElementById('installment-wrap').style.display='none';
  renderTxnList(); renderAcctOverview();
}

function doDeleteTxn(id, mode){
  const t=txns.find(x=>x.id===id);
  if(!t) return;
  const today=todayStr();
  if(mode==='single'){
    txns=txns.filter(x=>x.id!==id);
  } else if(mode==='future'){
    txns=txns.filter(x=>!(x.installmentGroup===t.installmentGroup&&x.date>=today));
  } else if(mode==='all'){
    txns=txns.filter(x=>x.installmentGroup!==t.installmentGroup);
  }
  sv(); closeEdit(); renderTxnList(); renderAcctOverview(); renderDashboard();

/* ── Calendar ── */
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed
let calSelectedDate = null;
let filterCat = null;
let manualFxRate = parseFloat(localStorage.getItem('manualFxRate'))||0;

function calPrevMonth(){
  calMonth--; if(calMonth<0){calMonth=11;calYear--;}
  calSelectedDate=null;
  renderCalendar(); renderTxnList();
}
function calNextMonth(){
  calMonth++; if(calMonth>11){calMonth=0;calYear++;}
  calSelectedDate=null;
  renderCalendar(); renderTxnList();
}
function clearCalSel(){
  calSelectedDate=null;
  renderCalendar(); renderTxnList();
}
function calSelectDay(dateStr, el){
  calSelectedDate = calSelectedDate===dateStr ? null : dateStr;
  renderCalendar();
  renderTxnList();
}
function renderCalendar(){
  const grid = document.getElementById('cal-grid');
  const title = document.getElementById('cal-title');
  if(!grid||!title) return;

  title.textContent = calYear+'年'+(calMonth+1)+'月';

  // Build date -> txn map
  const monthStr = calYear+'-'+(String(calMonth+1).padStart(2,'0'));
  const fmEl2=document.getElementById('filter-month'); if(fmEl2) fmEl2.value=monthStr;

  const dayMap = {};
  txns.filter(t=>t.date&&t.date.startsWith(monthStr)).forEach(t=>{
    const d = t.date.slice(0,10);
    if(!dayMap[d]) dayMap[d]={in:0,out:0};
    if(t.type==='in') dayMap[d].in+=twdEq(t.amount,t.currency);
    if(t.type==='out') dayMap[d].out+=twdEq(t.amount,t.currency);
  });

  const firstDay = new Date(calYear,calMonth,1).getDay();
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const today = todayStr();

  let html = '';
  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+='<div></div>';

  for(let d=1;d<=daysInMonth;d++){
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const hasTxn = dayMap[dateStr];
    const isToday = dateStr===today;
    const isSelected = dateStr===calSelectedDate;
    const hasIn = hasTxn&&hasTxn.in>0;
    const hasOut = hasTxn&&hasTxn.out>0;

    html += `<div onclick="calSelectDay('${dateStr}',this)" style="
      text-align:center;padding:4px 2px;border-radius:8px;cursor:pointer;
      background:${isSelected?'var(--text)':isToday?'var(--bg2)':'transparent'};
      color:${isSelected?'var(--bg)':isToday?'var(--text)':'var(--text)'};
      border:${isToday&&!isSelected?'1.5px solid var(--border2)':'1.5px solid transparent'};
      transition:all .1s;
    ">
      <div style="font-size:13px;font-weight:${isToday?'600':'400'}">${d}</div>
      <div style="display:flex;justify-content:center;gap:2px;margin-top:2px;min-height:6px">
        ${hasIn?'<div style="width:5px;height:5px;border-radius:50%;background:var(--green)"></div>':''}
        ${hasOut?'<div style="width:5px;height:5px;border-radius:50%;background:var(--red)"></div>':''}
      </div>
    </div>`;
  }
  grid.innerHTML = html;

  // Update day summary
  const sumEl = document.getElementById('cal-day-summary');
  const labelEl = document.getElementById('cal-day-label');
  const inEl = document.getElementById('cal-day-in');
  const outEl = document.getElementById('cal-day-out');
  const clearBtn = document.getElementById('cal-clear-btn');

  if(calSelectedDate && dayMap[calSelectedDate]){
    const d = dayMap[calSelectedDate];
    if(sumEl) sumEl.style.display='flex';
    if(labelEl) labelEl.textContent = calSelectedDate;
    if(inEl) inEl.textContent = d.in>0?'+'+Math.round(d.in).toLocaleString():'';
    if(outEl) outEl.textContent = d.out>0?'-'+Math.round(d.out).toLocaleString():'';
    if(clearBtn) clearBtn.style.display='';
  } else {
    if(sumEl) sumEl.style.display='none';
    if(clearBtn) clearBtn.style.display='none';
  }
}

function renderTxnList(){
  const fa=document.getElementById('filter-acct').value;
  const ft=document.getElementById('filter-type').value;
  const monthStr = calYear+'-'+String(calMonth+1).padStart(2,'0');
  let list;
  if(filterCat){
    // 類別篩選：跨月，最近10筆
    list=txns.filter(t=>t.cat===filterCat);
    if(fa) list=list.filter(t=>String(t.acctId)===fa||String(t.toAcctId)===fa);
    if(ft) list=list.filter(t=>t.type===ft);
    list=list.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  } else {
    list=txns.filter(t=>t.date&&t.date.startsWith(monthStr));
    if(calSelectedDate) list=list.filter(t=>t.date&&t.date.startsWith(calSelectedDate));
    if(fa) list=list.filter(t=>String(t.acctId)===fa||String(t.toAcctId)===fa);
    if(ft) list=list.filter(t=>t.type===ft);
  }
  const el=document.getElementById('txn-list');
  // Show active filter badge
  const filterBadge=filterCat?`<div style="padding:6px 12px;background:var(--red-bg);border-radius:var(--radius);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;font-size:12px"><span style="color:var(--red)">篩選：${filterCat}（跨月最近 10 筆）</span><button onclick="filterCat=null;renderTxnList()" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:14px">✕</button></div>`:'';
  if(!list.length){el.innerHTML=filterBadge+'<div class="empty-state">尚無記錄</div>';return;}
  el.innerHTML=filterBadge+list.map(t=>{
    const bg=t.type==='in'?'var(--green-bg)':t.type==='out'?'var(--red-bg)':'var(--purple-bg)';
    const ic=t.type==='in'?'+':t.type==='out'?'-':'⇄';
    const c=t.type==='in'?'var(--green)':t.type==='out'?'var(--red)':'var(--purple)';
    const s=t.type==='in'?'+':t.type==='out'?'-':'';
    const badge=`<span class="badge badge-${t.type}">${t.type==='in'?'收入':t.type==='out'?'支出':'轉帳'}</span>`;
    const an=t.acctId?acctName(t.acctId):'';
    const tn=t.toAcctId?' → '+acctName(t.toAcctId):'';
    return `<div class="txn-item">
      <div class="txn-icon" style="background:${bg}">${ic}</div>
      <div class="txn-meta">
        <div class="txn-desc">${t.cat}${t.note?' · '+t.note:''}</div>
        <div class="txn-sub">${t.date} ${badge}${an?' · '+an+tn:''}${t.tag?` <span style="background:var(--blue-bg);color:var(--blue);padding:1px 7px;border-radius:8px;font-size:10px;font-weight:500">#${t.tag}</span>`:''}${t.project?` · <span style="background:${(projects.find(p=>String(p.id)===String(t.project))||{}).color||'var(--blue)'};color:#fff;padding:1px 6px;border-radius:8px;font-size:10px">${(projects.find(p=>String(p.id)===String(t.project))||{}).name||''}</span>`:''}</div>
      </div>
      <div class="txn-amount" style="color:${c}">${s}${fmt(t.amount,t.currency)}</div>
      <button class="btn-sm" onclick="editTxn(${t.id})">編輯</button>
      <button class="btn-sm danger" onclick="deleteTxn(${t.id})">刪除</button>
    </div>`;
  }).join('');
}

function buildArAcctOpts(curId){
  const groups=[
    {type:'bank',label:'🏦 銀行帳戶'},{type:'cash',label:'💵 現金'},
    {type:'prepaid',label:'🎴 預付/儲值卡'},{type:'credit',label:'💳 信用卡'},
    {type:'invest',label:'📈 投資帳戶'},{type:'crypto',label:'🪙 加密貨幣'},
  ];
  let html='<option value="">不連動帳戶</option>';
  groups.forEach(g=>{
    const list=accounts.filter(a=>a.type===g.type);
    if(!list.length) return;
    html+=`<optgroup label="${g.label}">`;
    list.forEach(a=>{html+=`<option value="${a.id}"${String(a.id)===String(curId)?' selected':''}>${a.name} (${a.currency})</option>`;});
    html+='</optgroup>';
  });
  return html;
}
function updateArSettleSub(mainCat, type){
  const subSel = document.getElementById('ar-settle-sub');
  if(!subSel) return;
  const subs = CATS_SUB[mainCat] || [];
  subSel.innerHTML = '<option value="">細項（選填）</option>' +
    subs.map(s => '<option value="'+s+'">'+s+'</option>').join('');
}
function confirmSettle(id){
  const a=arItems.find(x=>x.id===id);
  if(!a) return;
  a.status='paid';
  const acctId=parseInt(document.getElementById('ar-settle-acct').value)||null;
  const date=document.getElementById('ar-settle-date').value||todayStr();
  if(acctId){
    const cat=document.getElementById('ar-settle-cat')?.value||(a.type==='ar'?'其他收入':'其他支出');
    const sub=document.getElementById('ar-settle-sub')?.value||null;
    txns.unshift({
      id:Date.now(), type:a.type==='ar'?'in':'out',
      amount:a.amount, currency:a.currency,
      cat, date, note:'結清：'+a.name+(a.note?' ('+a.note+')':''),
      tag:sub||null, acctId, toAcctId:null, project:null
    });
  }
  // Auto-generate next recurring item
  if(a.recurring && a.freq && a.due){
    const nextDue=nextRecurringDate(a.due, a.freq);
    arItems.unshift({
      id:Date.now()+1, type:a.type, name:a.name,
      amount:a.amount, currency:a.currency,
      due:nextDue, note:a.note,
      acctId:a.acctId, recurring:true, freq:a.freq,
      status:'unpaid'
    });
  }
  sv(); closeEdit(); renderAr(); renderAcctOverview();
  if(acctId) renderDashboard();
}
function deleteAr(id){

  if(!a) return;
  // Find related txns (settled ones have note starting with '結清：'+name)
  const relatedNote='結清：'+a.name;

    const modal=document.getElementById('edit-modal');
    modal.innerHTML=`
      <div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:380px;max-width:94vw">
        <div style="font-size:15px;font-weight:500;margin-bottom:14px">刪除 ${a.type==='ar'?'應收':'應付'}</div>

          <div style="font-weight:500">${a.name}</div>
          <div style="color:var(--text2);margin-top:2px">找到 ${related.length} 筆相關結清記錄</div>

        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">

            <div style="font-weight:500">只刪除此應收應付</div>
            <div style="color:var(--text2);font-size:12px;margin-top:2px">相關收支記錄保留</div>

            <div style="font-weight:500;color:var(--red)">一併刪除 ${related.length} 筆結清記錄</div>
            <div style="color:var(--red);font-size:12px;opacity:0.8;margin-top:2px">收支記錄也會一起移除</div>

function confirmDeleteAr(id, deleteRelated){
  const a=arItems.find(x=>x.id===id);
  if(!a) return;
  if(deleteRelated){
    const relatedNote='結清：'+a.name;
    txns=txns.filter(t=>!(t.note&&t.note.startsWith(relatedNote)));
  }
  arItems=arItems.filter(x=>x.id!==id);
  sv(); closeEdit(); renderAr(); renderAcctOverview(); renderDashboard();
}

/* ── budget ── */
function toggleCatEdit(){
  const p=document.getElementById('cat-edit-panel');
  p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display==='block') renderCatList();
}
function renderCatList(){
  document.getElementById('cat-list').innerHTML=CATS_OUT.map(c=>
    `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:0.5px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:13px">`+
    c+
    `<button onclick="removeCat(this)" data-cat="${c}" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0 0 0 2px">✕</button>`+
    `</span>`
  ).join('');
}
function addCat(){
  const input=document.getElementById('new-cat-input');
  const name=input.value.trim();
  if(!name){return;}
  if(CATS_OUT.includes(name)){alert('此分類已存在');return;}
  CATS_OUT.push(name);
  sv(); renderCatList(); renderBudget();
  input.value='';
}
function removeCat(btn){ const name = typeof btn === 'string' ? btn : btn.dataset.cat;
  if(CATS_OUT.length<=1){alert('至少保留一個分類');return;}
  if(!confirm('刪除「'+name+'」分類？已記錄的交易不受影響。')) return;
  CATS_OUT=CATS_OUT.filter(c=>c!==name);
  delete budgets[name];
  sv(); renderCatList(); renderBudget();
}
function renderBudget(){
  const m=thisMonth();
  const spentCat={}, spentSub={};
  txns.filter(t=>t.type==='out'&&t.date.startsWith(m)&&t.currency==='TWD').forEach(t=>{
    spentCat[t.cat]=(spentCat[t.cat]||0)+t.amount;
    if(t.tag){ const k=t.cat+'::'+t.tag; spentSub[k]=(spentSub[k]||0)+t.amount; }
  });

  // Budget form - save on button click
  document.getElementById('budget-form').innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'+
    CATS_OUT.map(cat=>{
      const subs=CATS_SUB[cat]||[];
      const col=CATS_COLOR[cat]||{color:'#666',bg:'#f5f5f5',border:'#ddd'};
      const subBudgets=budgets[cat+'_subs']||{};
      const subInputs=subs.map(s=>`
        <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border)">
          <span style="flex:1;font-size:12px;color:var(--text2)">${s}</span>
          <input type="text" id="bgt-sub-${cat}-${s}" value="${subBudgets[s]||''}" placeholder="0"
            inputmode="numeric"
            oninput="calcBudgetSubTotal('${cat}')"
            style="width:90px;padding:4px 8px;text-align:right;font-family:inherit;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)">
        </div>`).join('');
      return `<div style="border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden">
        <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:${col.bg};cursor:pointer" onclick="toggleBudgetSub(this)">
          <span style="font-size:13px;font-weight:500;color:${col.color};flex:1">${cat}</span>
          <input type="text" id="bgt-${cat}" value="${budgets[cat]||''}" placeholder="大類預算" inputmode="numeric"
            onclick="event.stopPropagation()"
            style="width:100px;padding:4px 8px;text-align:right;font-family:inherit;font-size:13px;border:0.5px solid ${col.border};border-radius:var(--radius);background:var(--bg);color:var(--text)">
          <span style="font-size:12px;color:${col.color}">▾</span>
        </div>
        <div class="budget-sub-panel" style="display:none;padding:8px 12px;background:var(--bg)">
          <div style="font-size:11px;color:var(--text2);margin-bottom:6px">細項預算（加總後會覆蓋大類預算）</div>
          ${subInputs}
        </div>
      </div>`;
    }).join('')+'</div>'+
    '<div style="margin-top:14px;display:flex;justify-content:flex-end;gap:8px"><button onclick="clearBudgetForm()" style="padding:8px 16px;font-size:13px;border:0.5px solid var(--border2);background:transparent;border-radius:var(--radius);cursor:pointer;font-family:inherit;color:var(--text2)">清除全部</button><button class="btn-primary" onclick="saveBudgetForm()">儲存預算</button></div>';

  // Progress
  const prog=document.getElementById('budget-progress');
  const sumEl=document.getElementById('budget-summary');

  function effectiveBudget(cat){
    const subBudgets=budgets[cat+'_subs']||{};
    const subSum=Object.values(subBudgets).reduce((s,v)=>s+(parseFloat(v)||0),0);
    return subSum>0?subSum:(parseFloat(budgets[cat])||0);
  }

  const bCats=CATS_OUT.filter(c=>effectiveBudget(c)>0);
  if(!bCats.length){ prog.innerHTML='<div class="empty-state">請先設定預算</div>'; if(sumEl) sumEl.innerHTML=''; return; }

  const totalBudget=bCats.reduce((s,c)=>s+effectiveBudget(c),0);
  const totalSpent=bCats.reduce((s,c)=>s+(spentCat[c]||0),0);
  const totalPct=totalBudget>0?Math.min(100,(totalSpent/totalBudget)*100):0;
  const totalOver=totalSpent>totalBudget;

  if(sumEl) sumEl.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:4px">
      <div class="metric-card"><div class="metric-label">總預算</div><div class="metric-value">${Math.round(totalBudget).toLocaleString()}</div></div>
      <div class="metric-card"><div class="metric-label">已使用 ${totalPct.toFixed(1)}%</div><div class="metric-value" style="color:${totalOver?'var(--red)':'var(--green)'}">${Math.round(totalSpent).toLocaleString()}</div></div>
      <div class="metric-card"><div class="metric-label">剩餘</div><div class="metric-value" style="color:${totalOver?'var(--red)':'var(--green)'}">${Math.round(totalBudget-totalSpent).toLocaleString()}</div></div>
    </div>`;

  prog.innerHTML=bCats.map(cat=>{
    const bgt=effectiveBudget(cat);
    const sp=spentCat[cat]||0;
    const pct=bgt>0?Math.min(100,(sp/bgt)*100):0;
    const over=sp>bgt&&bgt>0;
    const col=CATS_COLOR[cat]||{color:'#666',bg:'#f5f5f5'};
    const subBudgets=budgets[cat+'_subs']||{};
    const subs=CATS_SUB[cat]||[];
    const subRows=subs.filter(s=>(parseFloat(subBudgets[s])||0)>0||(spentSub[cat+'::'+s]||0)>0).map(s=>{
      const sBgt=parseFloat(subBudgets[s])||0;
      const sSp=spentSub[cat+'::'+s]||0;
      const sPct=sBgt>0?Math.min(100,(sSp/sBgt)*100):0;
      const sOver=sSp>sBgt&&sBgt>0;
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0 4px 16px;border-top:0.5px solid var(--border)">
        <span style="flex:1;font-size:11px;color:var(--text2)">${s}</span>
        ${sBgt>0?`<div style="width:60px;height:4px;background:var(--bg3);border-radius:2px"><div style="width:${sPct}%;height:100%;background:${sOver?'var(--red)':col.color};border-radius:2px"></div></div>`:''}
        <span style="font-size:11px;color:${sOver?'var(--red)':'var(--text2)'};">${sSp.toLocaleString()}${sBgt>0?' / '+sBgt.toLocaleString():''}</span>
      </div>`;
    }).join('');
    return `<div style="padding:10px 0;border-bottom:0.5px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:13px;font-weight:500;color:${col.color};flex:1">${cat}</span>
        <span style="font-size:12px;color:${over?'var(--red)':'var(--text2)'};">${sp.toLocaleString()} / ${bgt.toLocaleString()}</span>

function saveBudgetForm(){
  CATS_OUT.forEach(cat=>{
    const v=document.getElementById('bgt-'+cat)?.value;
    budgets[cat]=parseFloat(v)||0;
    // Read sub budgets
    const subs=CATS_SUB[cat]||[];
    const subBudgets={};
    let subSum=0;
    subs.forEach(s=>{
      const sv=parseFloat(document.getElementById('bgt-sub-'+cat+'-'+s)?.value)||0;
      if(sv>0){ subBudgets[s]=sv; subSum+=sv; }
    });
    if(subSum>0){
      budgets[cat+'_subs']=subBudgets;
      budgets[cat]=subSum; // auto total from subs
    } else {
      delete budgets[cat+'_subs'];
    }
  });
  sv(); renderBudget();
  alert('預算已儲存！');
}

function calcBudgetSubTotal(cat){
  const subs=CATS_SUB[cat]||[];
  const subSum=subs.reduce((s,sub)=>{
    const v=parseFloat(document.getElementById('bgt-sub-'+cat+'-'+sub)?.value)||0;
    return s+v;
  },0);
  const mainEl=document.getElementById('bgt-'+cat);
  if(mainEl&&subSum>0) mainEl.value=subSum;
}
function clearBudgetForm(){
  if(!confirm('確定清除所有預算設定？')) return;
  CATS_OUT.forEach(cat=>{

  sv(); renderBudget();
}
function toggleBudgetSub(el){

}
function updateSubBudget(cat, sub, val){

}

/* ── total assets ── */
function renderTotalAssets(){
  const el=document.getElementById('total-asset-bar');
  if(!accounts.length){el.innerHTML='<span style="font-size:14px;color:var(--text2)">前往帳戶頁新增帳戶以計算總資產</span>';return;}

  const bankTotal  =accounts.filter(a=>a.type==='bank') .reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const cashTotal  =accounts.filter(a=>a.type==='cash'||a.type==='prepaid') .reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const investTotal=accounts.filter(a=>a.type==='invest').reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const cryptoTotal=accounts.filter(a=>a.type==='crypto').reduce((s,a)=>s+twdEq(Math.max(0,acctBalance(a)),a.currency),0);
  const totalAsset =bankTotal+investTotal+cryptoTotal;

  const today=new Date(); today.setHours(0,0,0,0);
  const todayStr2=today.toISOString().slice(0,10);
  // 信用卡：分已到期帳單 vs 未到期分期
  let creditBilled=0, creditFuture=0;
  accounts.filter(a=>a.type==='credit').forEach(a=>{
    const bal=acctBalance(a);
    if(bal>=0) return;
    const totalOwed=Math.abs(twdEq(bal,a.currency));
    // 未到期分期
    const futureTxns=txns.filter(t=>t.acctId===a.id&&t.currency===a.currency&&t.date>todayStr2&&t.installmentGroup);
    const futureAmt=twdEq(futureTxns.reduce((s,t)=>s+(t.type==='out'?t.amount:0),0),a.currency);
    creditFuture+=futureAmt;
    creditBilled+=Math.max(0,totalOwed-futureAmt);
  });
  const creditDebt=creditBilled; // 只有已到期才算負債
  const loanDebt=accounts.filter(a=>a.type==='loan').reduce((s,a)=>{const b=acctBalance(a);return s+(b<0?Math.abs(twdEq(b,a.currency)):0);},0);
  const totalLiab=loanDebt; // 淨資產只扣貸款，信用卡和未到期分期不計入
  const net=totalAsset-totalLiab;
  const ratio=totalAsset>0?Math.min(100,(net/totalAsset)*100):0;

  function row(icon,label,val,color,pct){
    if(Math.abs(val)<0.5) return '';
    const pctBadge=pct>0?'<span style="font-size:10px;color:var(--text2);margin-right:6px;opacity:0.7">'+pct.toFixed(1)+'%</span>':'';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border)">'+
      '<span style="font-size:13px;color:var(--text2)">'+icon+' '+label+'</span>'+
      '<span style="display:flex;align-items:center">'+pctBadge+'<span style="font-size:13px;font-weight:500;color:'+(color||'var(--text)')+'">'+Math.round(val).toLocaleString()+'</span></span>'+
    '</div>';
  }

  el.style.cssText='border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0;margin-bottom:14px;overflow:hidden;background:var(--bg);width:100%';
  el.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;width:100%" class="asset-grid">'+
    '<div style="padding:16px 18px;border-right:0.5px solid var(--border)">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">資產</div>'+
      row('🏦','銀行',bankTotal,'var(--text)',totalAsset>0?bankTotal/totalAsset*100:0)+
      row('💵','現金 / 儲值',cashTotal,'var(--text)',0)+
      row('📈','投資',investTotal,'var(--text)',totalAsset>0?investTotal/totalAsset*100:0)+
      row('🪙','加密貨幣',cryptoTotal,'var(--text)',totalAsset>0?cryptoTotal/totalAsset*100:0)+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px">'+
        '<span style="font-size:12px;color:var(--text2)">小計</span>'+
        '<span style="font-size:17px;font-weight:700;color:var(--green)">'+Math.round(totalAsset).toLocaleString('zh-TW')+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="padding:16px 18px;border-right:0.5px solid var(--border)">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">負債</div>'+
      row('💳','信用卡',creditDebt,'var(--red)',totalAsset>0?creditDebt/totalAsset*100:0)+
      row('🏛','貸款',loanDebt,'var(--red)',totalAsset>0?loanDebt/totalAsset*100:0)+
      (totalLiab<0.5?'<div style="font-size:13px;color:var(--text3);padding:5px 0">無負債</div>':'')+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px">'+
        '<span style="font-size:12px;color:var(--text2)">小計</span>'+
        '<span style="font-size:17px;font-weight:700;color:'+(totalLiab>0?'var(--red)':'var(--text2)')+'">'+Math.round(totalLiab).toLocaleString()+'</span>'+
      '</div>'+
      (creditFuture>0?'<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;margin-top:6px;border-top:0.5px dashed var(--border)">'+
        '<span style="font-size:12px;color:var(--text2)">🔄 未到期分期</span>'+
        '<span style="font-size:12px;color:var(--text2)">'+Math.round(creditFuture).toLocaleString()+'</span>'+
      '</div>':'')+
    '</div>'+
    '<div style="padding:16px 18px;background:'+(net>=0?'var(--green-bg)':'var(--red-bg)')+'">'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">淨資產</div>'+
      '<div style="font-size:28px;font-weight:700;color:'+(net>=0?'var(--green)':'var(--red)')+'">'+Math.round(net).toLocaleString()+'</div>'+
      '<div style="font-size:11px;color:var(--text2);margin-top:4px;margin-bottom:12px">≈ TWD</div>'+
      '<div style="margin-bottom:10px">'+
        '<div style="font-size:11px;color:var(--text2);margin-bottom:4px">USD/TWD 匯率</div>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<input type="text" id="usd-twd-rate" value="'+(manualFxRate||'')+
            '" placeholder="例：31.5" inputmode="decimal"'+
            ' style="width:80px;padding:4px 8px;font-family:inherit;font-size:14px;font-weight:600;border:0.5px solid rgba(255,255,255,0.4);border-radius:6px;background:rgba(255,255,255,0.2);color:inherit;text-align:center">'+
          '<button onclick="saveManualFxRate(document.getElementById(\'usd-twd-rate\').value)"'+
            ' style="padding:4px 10px;font-size:12px;font-weight:500;border:0.5px solid rgba(255,255,255,0.4);border-radius:6px;background:rgba(255,255,255,0.25);color:inherit;cursor:pointer;font-family:inherit">套用</button>'+
        '</div>'+
      '</div>'+
      '<div style="height:5px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden">'+
        '<div style="height:100%;border-radius:3px;background:'+(net>=0?'var(--green)':'var(--red)')+'transition:width .4s;width:'+ratio.toFixed(1)+'%"></div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--text2);margin-top:5px">'+ratio.toFixed(1)+'% 資產負債比</div>'+
    '</div>'+
    '</div>';
}

function renderDueReminder(){
  const el=document.getElementById('due-reminder');
  if(!el) return;
  const today=new Date(); today.setHours(0,0,0,0);
  const in7=new Date(today); in7.setDate(today.getDate()+7);
  const todayStr2=today.toISOString().slice(0,10);
  const in7Str=in7.toISOString().slice(0,10);

  // AR/AP items — 應收提前、應付不調整（使用者說有的會延後，保留原日期）
  // 用調整後日期判斷是否進入7天提醒窗口
  const arWithAdj=arItems.filter(a=>a.status!=='paid'&&a.due).map(a=>{
    const adjDue=a.type==='ar'?adjustedReminderDate(a.due):a.due;
    return {...a, adjDue};
  });
  const overdue=arWithAdj.filter(a=>a.adjDue<todayStr2).sort((a,b)=>a.adjDue.localeCompare(b.adjDue));
  const upcoming=arWithAdj.filter(a=>a.adjDue>=todayStr2&&a.adjDue<=in7Str).sort((a,b)=>a.adjDue.localeCompare(b.adjDue));

  // Credit card payment reminders
  const ccReminders=accounts.filter(a=>a.type==='credit'&&a.payDay).filter(a=>{
    const bal=acctBalance(a);
    if(bal>=0) return false;
    const payDay=parseInt(a.payDay)||0;
    if(!payDay) return false;
    const thisMonth=new Date(today.getFullYear(),today.getMonth(),payDay);
    const nextMonth=new Date(today.getFullYear(),today.getMonth()+1,payDay);
    const payDate=today<=thisMonth?thisMonth:nextMonth;
    const diff=Math.round((payDate-today)/(1000*60*60*24));
    return diff>=0 && diff<=7;
  });

  if(!overdue.length&&!upcoming.length&&!ccReminders.length){el.innerHTML='';return;}

  const dayDiff=(dateStr)=>{
    const d=new Date(dateStr); d.setHours(0,0,0,0);
    return Math.round((d-today)/(1000*60*60*24));
  };
  const dayLabel=(diff)=>diff<0?`逾期${Math.abs(diff)}天`:diff===0?'今天到期':diff===1?'明天到期':`${diff}天後`;
  const adjNote=(a)=>a.adjDue&&a.adjDue!==a.due?`<span style="font-size:10px;color:var(--text2);margin-left:4px">（原${a.due}，遇假日提前）</span>`:'';

  let html=`<div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px">🔔 即將到期提醒</div>`;

  // Overdue
  overdue.forEach(a=>{
    const diff=dayDiff(a.adjDue);
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:50%;background:#EF4444;flex-shrink:0"></div>
      <div style="flex:1">
        <span style="font-size:13px;font-weight:500">${a.name}</span>
        <span style="background:#FEF2F2;color:#991B1B;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:500;margin-left:5px">${dayLabel(diff)}</span>
        ${adjNote(a)}
        <div style="font-size:11px;color:var(--text2);margin-top:1px">${a.type==='ar'?'應收':'應付'} · 到期：${a.due}</div>
      </div>
      <span style="font-size:13px;font-weight:600;color:${a.type==='ar'?'var(--green)':'var(--red)'};flex-shrink:0;margin-right:6px">${a.type==='ar'?'+':'-'}${fmt(a.amount,a.currency)}</span>
      <button onclick="markArPaid(${a.id})" style="flex-shrink:0;padding:4px 10px;font-size:12px;font-weight:500;background:${a.type==='ar'?'var(--green)':'var(--red)'};color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit">結清</button>
    </div>`;
  });

  // Upcoming AR/AP
  upcoming.forEach(a=>{
    const diff=dayDiff(a.adjDue);
    const dotColor=diff===0?'#F97316':diff<=3?'#F59E0B':'#3B82F6';
    const badgeBg=diff===0?'#FFF7ED':diff<=3?'#FFFBEB':'#EFF6FF';
    const badgeColor=diff===0?'#9A3412':diff<=3?'#92400E':'#1D4ED8';
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
      <div style="flex:1">
        <span style="font-size:13px;font-weight:500">${a.name}</span>
        <span style="background:${badgeBg};color:${badgeColor};padding:1px 6px;border-radius:8px;font-size:10px;font-weight:500;margin-left:5px">${dayLabel(diff)}</span>
        ${adjNote(a)}
        <div style="font-size:11px;color:var(--text2);margin-top:1px">${a.type==='ar'?'應收':'應付'} · 到期：${a.due}</div>
      </div>
      <span style="font-size:13px;font-weight:600;color:${a.type==='ar'?'var(--green)':'var(--red)'};flex-shrink:0;margin-right:6px">${a.type==='ar'?'+':'-'}${fmt(a.amount,a.currency)}</span>
      <button onclick="markArPaid(${a.id})" style="flex-shrink:0;padding:4px 10px;font-size:12px;font-weight:500;background:${a.type==='ar'?'var(--green)':'var(--red)'};color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit">結清</button>
    </div>`;
  });

  // Credit card reminders
  ccReminders.forEach(a=>{
    const payDay=parseInt(a.payDay);
    const thisMonth=new Date(today.getFullYear(),today.getMonth(),payDay);
    const nextMonth=new Date(today.getFullYear(),today.getMonth()+1,payDay);
    const payDate=today<=thisMonth?thisMonth:nextMonth;
    const diff=Math.round((payDate-today)/(1000*60*60*24));
    const bal=acctBalance(a);
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:50%;background:#8B5CF6;flex-shrink:0"></div>
      <div style="flex:1">
        <span style="font-size:13px;font-weight:500">${a.name}</span>
        <span style="background:#F5F3FF;color:#5B21B6;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:500;margin-left:5px">繳款${diff===0?'今天':diff+'天後'}</span>
        <div style="font-size:11px;color:var(--text2);margin-top:1px">信用卡 · 繳款日每月${payDay}號</div>
      </div>
      <span style="font-size:13px;font-weight:600;color:var(--red);flex-shrink:0;margin-right:6px">${fmt(Math.abs(bal),a.currency)}</span>
      <button onclick="quickCreditPayment(${a.id})" style="flex-shrink:0;padding:4px 10px;font-size:12px;font-weight:500;background:#8B5CF6;color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit">💳 繳費</button>
    </div>`;
  });

  html+='</div>';
  el.innerHTML=html;
}

function buildAcctOptgroups(curId, forOut){
  const groups= forOut ? [
    {type:'cash',label:'💵 現金'},
    {type:'credit',label:'💳 信用卡'},
    {type:'bank',label:'🏦 銀行帳戶'},
    {type:'prepaid',label:'🎴 預付/儲值卡'},
    {type:'invest',label:'📈 投資帳戶'},{type:'crypto',label:'🪙 加密貨幣'},
    {type:'loan',label:'🏛 貸款'},
  ] : [
    {type:'bank',label:'🏦 銀行帳戶'},{type:'cash',label:'💵 現金'},
    {type:'prepaid',label:'🎴 預付/儲值卡'},{type:'credit',label:'💳 信用卡'},
    {type:'invest',label:'📈 投資帳戶'},{type:'crypto',label:'🪙 加密貨幣'},
    {type:'loan',label:'🏛 貸款'},
  ];
  let html='<option value="">選擇帳戶</option>';
  groups.forEach(g=>{
    const list=accounts.filter(a=>a.type===g.type);
    if(!list.length) return;
    html+=`<optgroup label="${g.label}">`;
    list.forEach(a=>{html+=`<option value="${a.id}"${String(a.id)===String(curId)?' selected':''}>${a.name} (${a.currency})</option>`;});
    html+='</optgroup>';
  });
  return html;
}

  const rate = hasRate ? (parseFloat(document.getElementById('sheet-inst-rate')?.value)||0) : 0;
  const first = parseFloat(document.getElementById('sheet-inst-first')?.value)||0;
  if(amt<=0||count<=0){ return; }

  let each=0, total=0;
  if(hasRate && rate>0){
    const r=rate/100/12;
    const pmt=amt*r*Math.pow(1+r,count)/(Math.pow(1+r,count)-1);
    each=Math.round(pmt);
    total=each*count;
  } else {
    const remaining=count>1?count-1:1;
    each=first>0?Math.ceil((amt-first)/remaining):Math.ceil(amt/count);
    total=first>0?first+(each*(count-1)):each*count;
  }

  const eachEl=document.getElementById('sheet-inst-each');
  const totalEl=document.getElementById('sheet-inst-total');
  if(eachEl) eachEl.value=each>0?each:'';
  if(totalEl) totalEl.value=total>0?total:'';
}
function addTxnFromSheet(){
  const baseAmt=parseFloat(document.getElementById('sheet-amount').value)||0;
  const hasForeign=document.getElementById('sheet-has-foreign')?.checked;
  const foreignFee=hasForeign?(parseFloat(document.getElementById('sheet-foreign-fee')?.value)||0):0;
  const amt=baseAmt+foreignFee;
  if(!amt||amt<=0){alert('請輸入有效金額');return;}
  const acctId = parseInt(document.getElementById('sheet-acct-sel')?.value)||null;
  const toAcctId = sheetType==='xfer'
    ? (parseInt(document.getElementById('sheet-to-sel')?.value)||null)
    : null;
  if(sheetType==='xfer'&&acctId===toAcctId){alert('轉出與轉入帳戶不能相同');return;}
  const cat=document.getElementById('sheet-cat').value||CATS_OUT[0];
  const cur=document.getElementById('sheet-currency').value;
  const date=document.getElementById('sheet-date').value||todayStr();
  const note=document.getElementById('sheet-note').value;
  const proj=document.getElementById('sheet-project').value||null;
  const tag=document.getElementById('sheet-tag')?.value.trim()||null;
  const isInst=document.getElementById('sheet-inst-check')?.checked && sheetType==='out';

  if(isInst){
    const count=parseInt(document.getElementById('sheet-inst-count').value)||1;
    const startMonth=document.getElementById('sheet-inst-start').value||thisMonth();
    const firstAmt=parseFloat(document.getElementById('sheet-inst-first')?.value)||0;
    const hasInstRate=document.getElementById('sheet-inst-has-rate')?.checked;
    const rate=hasInstRate?(parseFloat(document.getElementById('sheet-inst-rate')?.value)||0):0;
    let each;
    if(rate>0){
      const r=rate/100/12;
      each=Math.round(amt*r*Math.pow(1+r,count)/(Math.pow(1+r,count)-1));
    } else {
      each=firstAmt>0?Math.ceil((amt-firstAmt)/(count-1||1)):Math.ceil(amt/count);
    }
    const instId=Date.now();
    const baseDate=document.getElementById('sheet-date').value||todayStr();
    const baseDay=parseInt(baseDate.split('-')[2])||1;
    for(let i=0;i<count;i++){
      const d=new Date(startMonth+'-01');
      d.setMonth(d.getMonth()+i);
      // Use same day as base date, capped at month end
      const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
      const day=Math.min(baseDay,daysInMonth);
      const dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      // With interest: all periods equal (last adjusts for rounding); without: first period special
      let periodAmt;
      if(rate>0){
        periodAmt=each; // equal payments with interest
      } else {
        periodAmt=i===0&&firstAmt>0?firstAmt:(i===count-1?(amt-firstAmt-(each*(count-2>0?count-2:0))):each);
      }
      txns.unshift({id:instId+i,type:'out',amount:periodAmt,currency:cur,cat,
        date:dateStr,note:note?(note+' ('+(i+1)+'/'+count+')'):'分期'+(i+1)+'/'+count,
        acctId,toAcctId:null,project:proj,tag,
        installmentGroup:instId,installmentIdx:i+1,installmentTotal:count});
    }
    txns.sort((a,b)=>b.date.localeCompare(a.date));
    alert('已新增 '+count+' 筆分期（每期 '+each+' '+cur+'）');
  } else {
    txns.unshift({id:Date.now(),type:sheetType,amount:amt,currency:cur,cat,date,note,project:proj,acctId,toAcctId,tag,
      foreignFee:foreignFee||0});
  }
  sv();
  closeAddSheet();
  document.getElementById('sheet-amount').value='';
  document.getElementById('sheet-note').value='';
  const stag=document.getElementById('sheet-tag'); if(stag) stag.value='';
  const srate=document.getElementById('sheet-inst-rate'); if(srate) srate.value='';
  const sfee=document.getElementById('sheet-foreign-fee'); if(sfee) sfee.value='';
  const shasf=document.getElementById('sheet-has-foreign'); if(shasf) shasf.checked=false;
  const sfwrap=document.getElementById('sheet-foreign-wrap'); if(sfwrap) sfwrap.style.display='none';
  const stotal=document.getElementById('sheet-total-display'); if(stotal) stotal.value='';
  const sinst=document.getElementById('sheet-inst-total'); if(sinst) sinst.value='';
  if(document.getElementById('sheet-inst-check')) document.getElementById('sheet-inst-check').checked=false;
  const sif=document.getElementById('sheet-inst-first'); if(sif) sif.value='';
  if(document.getElementById('sheet-inst-fields')) document.getElementById('sheet-inst-fields').style.display='none';
  renderCalendar(); renderTxnList(); renderAcctOverview();
}

function nextRecurringDate(dateStr, freq){
  if(!dateStr) return '';
  const d=new Date(dateStr);
  if(freq&&freq.startsWith('custom_')){
    const n=parseInt(freq.split('_')[1])||1;
    d.setMonth(d.getMonth()+n);
  } else {
    switch(freq){
      case 'weekly':   d.setDate(d.getDate()+7); break;
      case 'monthly':  d.setMonth(d.getMonth()+1); break;
      case 'quarterly':d.setMonth(d.getMonth()+3); break;
      case 'yearly':   d.setFullYear(d.getFullYear()+1); break;
      default:         d.setMonth(d.getMonth()+1);
    }
  }
  return d.toISOString().slice(0,10);
}
function freqLabel(freq){
  if(freq&&freq.startsWith('custom_')){
    const n=parseInt(freq.split('_')[1])||1;
    return '每'+n+'個月';
  }
  return {weekly:'每週',monthly:'每月',quarterly:'每季',yearly:'每年'}[freq]||'定期';
}
